{"openapi":"3.1.0","info":{"title":"API Reference","version":"1.0.0"},"paths":{"/waves/v1/lightning-v3.1/get_speech":{"post":{"operationId":"synthesize-lightning-v-31-speech","summary":"Lightning v3.1","description":"Get speech for given text using the Lightning v3.1 model\n\n## Overview\n\nLightning v3.1 is a 44 kHz text-to-speech model that delivers natural, expressive, and realistic speech synthesis.\n\n## Key Features\n\n* **Voice Cloning Support**: Compatible with cloned voices\n* **Ultra-Low Latency**: Optimized for real-time applications\n* **Multi-Language**: Supports English (en) and Hindi (hi)\n* **Multiple Output Formats**: PCM, MP3, WAV, ulaw, and alaw\n* **Flexible Sample Rates**: 8000 Hz to 44100 Hz\n* **Speed Control**: Adjustable from 0.5x to 2x speed\n","tags":["subpackage_textToSpeech"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}},{"name":"Accept","in":"header","description":"Must be `audio/wav` to receive binary audio. Required for proper playback.","required":true,"schema":{"$ref":"#/components/schemas/WavesV1LightningV31GetSpeechPostParametersAccept"}}],"responses":{"200":{"description":"Synthesized speech retrieved successfully.","content":{"application/octet-stream":{"schema":{"type":"string","format":"binary"}}}},"400":{"description":"Bad request.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/SynthesizeLightningV31SpeechRequestBadRequestError"}}}},"401":{"description":"Unauthorized.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/SynthesizeLightningV31SpeechRequestUnauthorizedError"}}}},"500":{"description":"Server error occurred.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/SynthesizeLightningV31SpeechRequestInternalServerError"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/LightningV31Request"}}}}}},"/waves/v1/lightning-v3.1/stream":{"post":{"operationId":"stream-lightning-v-31-speech","summary":"Lightning v3.1 SSE","description":"Stream speech for given text using the Lightning v3.1 SSE API\n\n## Overview\n\nThe Lightning v3.1 SSE API provides real-time text-to-speech streaming capabilities with natural, expressive voice synthesis. This API uses Server-Sent Events (SSE) to deliver audio chunks as they're generated, enabling low-latency audio playback without waiting for the entire audio file to process.\n\nLightning v3.1 is a 44 kHz model that produces natural, expressive, and realistic speech, with support for voice cloning.\n\n## When to Use\n\n* **Interactive Applications**: Perfect for chatbots, virtual assistants, and other applications requiring immediate voice responses\n* **Long-Form Content**: Efficiently stream audio for articles, stories, or other long-form content without buffering delays\n* **Voice User Interfaces**: Create natural-sounding voice interfaces with minimal perceived latency\n* **Accessibility Solutions**: Provide real-time audio versions of written content for users with visual impairments\n\n## How It Works\n\n1. **Make a POST Request**: Send your text and voice settings to the API endpoint\n2. **Receive Audio Chunks**: The API processes your text and streams audio back as base64-encoded chunks with 1024 byte size\n3. **Process the Stream**: Handle the SSE events to decode and play audio chunks sequentially\n4. **End of Stream**: The API sends a completion event when all audio has been delivered\n","tags":["subpackage_textToSpeech"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Synthesized speech retrieved successfully.","content":{"application/json":{"schema":{"type":"object","properties":{}}}}},"400":{"description":"Bad request.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/StreamLightningV31SpeechRequestBadRequestError"}}}},"401":{"description":"Unauthorized.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/StreamLightningV31SpeechRequestUnauthorizedError"}}}},"500":{"description":"Server error occurred.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/StreamLightningV31SpeechRequestInternalServerError"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/LightningV31Request"}}}}}},"/waves/v1/lightning-v2/get_speech":{"post":{"operationId":"synthesize-lightningv-2-speech","summary":"Lightning v2","description":"Get speech for given text using the Waves API","tags":["subpackage_textToSpeech"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Synthesized speech retrieved successfully.","content":{"application/octet-stream":{"schema":{"type":"string","format":"binary"}}}},"400":{"description":"Bad request.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/SynthesizeLightningv2SpeechRequestBadRequestError"}}}},"401":{"description":"Unauthorized.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/SynthesizeLightningv2SpeechRequestUnauthorizedError"}}}},"500":{"description":"Server error occurred.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/SynthesizeLightningv2SpeechRequestInternalServerError"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/Lightningv2Request"}}}}}},"/waves/v1/lightning-v2/stream":{"post":{"operationId":"stream-lightningv-2-speech","summary":"Lightning v2 SSE","description":"The Lightning v2 SSE API provides real-time text-to-speech streaming capabilities with high-quality voice synthesis. This API uses Server-Sent Events (SSE) to deliver audio chunks as they're generated, enabling low-latency audio playback without waiting for the entire audio file to process.\nFor an end-to-end example of how to use the Lightning v2 SSE API, check out [Text to Speech (SSE) Example](https://github.com/smallest-inc/waves-examples/blob/main/lightning_v2/http_streaming/http_streaming_api.py)\n\n## When to Use\n\n- **Interactive Applications**: Perfect for chatbots, virtual assistants, and other applications requiring immediate voice responses\n- **Long-Form Content**: Efficiently stream audio for articles, stories, or other long-form content without buffering delays\n- **Voice User Interfaces**: Create natural-sounding voice interfaces with minimal perceived latency\n- **Accessibility Solutions**: Provide real-time audio versions of written content for users with visual impairments\n\n## How It Works\n\n1. **Make a POST Request**: Send your text and voice settings to the API endpoint\n2. **Receive Audio Chunks**: The API processes your text and streams audio back as base64-encoded chunks with 1024 byte size\n3. **Process the Stream**: Handle the SSE events to decode and play audio chunks sequentially\n4. **End of Stream**: The API sends a completion event when all audio has been delivered\n","tags":["subpackage_textToSpeech"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Synthesized speech retrieved successfully.","content":{"application/json":{"schema":{"type":"object","properties":{}}}}},"400":{"description":"Bad request.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/StreamLightningv2SpeechRequestBadRequestError"}}}},"401":{"description":"Unauthorized.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/StreamLightningv2SpeechRequestUnauthorizedError"}}}},"500":{"description":"Server error occurred.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/StreamLightningv2SpeechRequestInternalServerError"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/Lightningv2Request"}}}}}},"/waves/v1/pulse/get_text":{"post":{"operationId":"pulse","summary":"Pulse (Pre-Recorded)","description":"Convert speech to text using file upload with the Pulse STT POST API\n\nThe STT POST API allows you to convert speech to text using two different input methods:\n\n1. **Raw Audio Bytes** (`application/octet-stream`) - Send raw audio data with all parameters as query parameters\n2. **Audio URL** (`application/json`) - Provide only a URL to an audio file in the JSON body, with all other parameters as query parameters\n\nBoth methods use our Pulse STT model with automatic language detection across 30+ languages.\n","tags":["subpackage_speechToText"],"parameters":[{"name":"language","in":"query","description":"Language of the audio file. Set explicitly to the known language for best accuracy.\n\nAuto-detection scopes:\n- `multi-eu` (default) — European set: de, en, fr, it, nl, pt, ru, es.\n- `multi-indic` — Indic set: en, hi, mr, pa, gu, or, ka, ta, te, ml, bn.\n- `multi-asian` — East Asian set: en, ja, ko, zh, yue.\n- `multi` — full multilingual auto-detection across all supported languages.\n\nOmitting `language` routes to `multi-eu`, which can mis-detect on non-European audio. Always pass `language` explicitly when the source language is known, or pick the regional `multi-*` scope that matches your audio.\n","required":false,"schema":{"$ref":"#/components/schemas/WavesV1PulseGetTextPostParametersLanguage","default":"multi-eu"}},{"name":"encoding","in":"query","description":"Audio encoding of the bytes you upload. Mirrors the `encoding`\nparameter on the realtime WS endpoint.\n\n- `linear16`, `linear32` — raw PCM (16-bit and 32-bit)\n- `alaw`, `mulaw` — 8 kHz telephony codecs\n- `opus`, `ogg_opus` — Opus compressed audio (raw and Ogg container)\n\nWhen omitted, the server detects the format from the file's\ncontainer header (works for `.wav`, `.mp3`, `.flac`, `.ogg`,\n`.m4a`, `.webm`).\n","required":false,"schema":{"$ref":"#/components/schemas/WavesV1PulseGetTextPostParametersEncoding"}},{"name":"webhook_url","in":"query","required":false,"schema":{"type":"string","format":"uri"}},{"name":"webhook_extra","in":"query","required":false,"schema":{"type":"string"}},{"name":"word_timestamps","in":"query","description":"Whether to include word and utterance level timestamps in the response","required":false,"schema":{"type":"boolean","default":false}},{"name":"diarize","in":"query","description":"Whether to perform speaker diarization","required":false,"schema":{"type":"boolean","default":false}},{"name":"gender_detection","in":"query","description":"Whether to predict the gender of the speaker","required":false,"schema":{"$ref":"#/components/schemas/WavesV1PulseGetTextPostParametersGenderDetection","default":"false"}},{"name":"emotion_detection","in":"query","description":"Whether to predict speaker emotions","required":false,"schema":{"$ref":"#/components/schemas/WavesV1PulseGetTextPostParametersEmotionDetection","default":"false"}},{"name":"format","in":"query","description":"Master formatting switch for the transcript. When `false`, forces\n`punctuate=false`, `capitalize=false`, and also disables Inverse\nText Normalization (ITN) so it cannot silently reintroduce\npunctuation or casing.\n\nWhen `true`, the `punctuate` and `capitalize` params take effect\nindependently. Leave `format=true` and use those two to fine-tune.\n","required":false,"schema":{"$ref":"#/components/schemas/WavesV1PulseGetTextPostParametersFormat","default":"true"}},{"name":"punctuate","in":"query","description":"When `false`, strips end-of-sentence punctuation (`.`, `,`, `?`, `!`)\nfrom the transcript, `words[].word`, and\n`utterances[].transcript`. Does not affect casing — use\n`capitalize` for that. Overridden to `false` when `format=false`.\n","required":false,"schema":{"$ref":"#/components/schemas/WavesV1PulseGetTextPostParametersPunctuate","default":"true"}},{"name":"capitalize","in":"query","description":"When `false`, lowercases the entire transcript output (transcript,\n`words[].word`, and `utterances[].transcript`). Does not affect\npunctuation — use `punctuate` for that. Overridden to `false`\nwhen `format=false`.\n","required":false,"schema":{"$ref":"#/components/schemas/WavesV1PulseGetTextPostParametersCapitalize","default":"true"}},{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Speech transcribed successfully","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Speech to Text_pulse_Response_200"}}}},"400":{"description":"Bad request - Invalid parameters or file format","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"401":{"description":"Unauthorized - Invalid or missing authentication","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"413":{"description":"Payload too large - File size exceeds limit","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"429":{"description":"Too many requests - Rate limit exceeded","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"500":{"description":"Internal server error","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}}},"requestBody":{"content":{"application/octet-stream":{"schema":{"type":"string","format":"binary"}}}}}},"/waves/v1/{model}/get_voices":{"get":{"operationId":"get-waves-voices","summary":"Get Voices","description":"Get voices supported for a given model using the new Waves API.","tags":["subpackage_voices"],"parameters":[{"name":"model","in":"path","description":"The model to use for speech synthesis.","required":true,"schema":{"$ref":"#/components/schemas/WavesV1ModelGetVoicesGetParametersModel"}},{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Voices retrieved successfully.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Voices_getWavesVoices_Response_200"}}}},"400":{"description":"Bad request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/GetWavesVoicesRequestBadRequestError"}}}},"401":{"description":"Unauthorized","content":{"application/json":{"schema":{"$ref":"#/components/schemas/GetWavesVoicesRequestUnauthorizedError"}}}},"500":{"description":"Server error occurred","content":{"application/json":{"schema":{"$ref":"#/components/schemas/GetWavesVoicesRequestInternalServerError"}}}}}}},"/waves/v1/voice-cloning":{"post":{"operationId":"create-voice-clone","summary":"Create a Voice Clone","description":"Create an instant voice clone in a single call. Defaults to `lightning-v3.1`.\n","tags":["subpackage_voiceCloning"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Voice clone created. Includes pre-generated sample clips of the new voice.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Voice Cloning_createVoiceClone_Response_200"}}}},"400":{"description":"Validation error. Common causes: no file provided, invalid MIME type,\nfile too large, clone limit exceeded, invalid language, or\n`model=lightning-v2` (deprecated).\n","content":{"application/json":{"schema":{"$ref":"#/components/schemas/CreateVoiceCloneRequestBadRequestError"}}}},"401":{"description":"Unauthorized — missing or invalid API key.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/CreateVoiceCloneRequestUnauthorizedError"}}}},"500":{"description":"Server error. The `error_code` field may be populated for known failure modes.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/CreateVoiceCloneRequestInternalServerError"}}}}},"requestBody":{"content":{"multipart/form-data":{"schema":{"type":"object","properties":{"displayName":{"type":"string","description":"Human-readable name for the voice clone."},"file":{"type":"string","format":"binary","description":"Audio file to clone from. Supported MIME types:\n`audio/mpeg`, `audio/mpeg-3`, `audio/wav`, `audio/wave`,\n`audio/webm`, `video/webm`, `audio/mp4`, `video/mp4`.\nMaximum size: 5 MB.\n"},"description":{"type":"string","description":"Optional longer description for the voice clone."},"accent":{"type":"string","description":"Optional accent tag (e.g. \"general\", \"indian\")."},"tags":{"type":"string","description":"Optional comma-separated list of tags. Server splits on\ncommas and trims whitespace (`\"en, tone-test\"` → `[\"en\", \"tone-test\"]`).\n"},"language":{"type":"string","description":"Primary language the clone will be used for. Optional, but\n**strongly recommended** — set it to the language of your\nreference audio. When a TTS request later uses\n`language: \"auto\"`, the server falls back to this value, so\nsetting it now avoids silent language mismatches at inference\ntime.\n\nMust be one of the languages supported by `lightning-v3.1`\n(e.g. `en`, `hi`, `multi`). The server validates and rejects\nunsupported codes with a 400.\n"},"model":{"$ref":"#/components/schemas/WavesV1VoiceCloningPostRequestBodyContentMultipartFormDataSchemaModel","default":"lightning-v3.1","description":"Voice cloning model. Defaults to `lightning-v3.1`.\n`lightning-v2` is accepted by the schema for historical\nreasons but is deprecated — the server returns 400 with\n`\"Voice cloning for lightning-v2 is deprecated. Please use lightning-v3.1\"`.\n"}},"required":["displayName","file"]}}}}},"get":{"operationId":"list-voice-clones","summary":"List Voice Clones","description":"Retrieve all voice clones in your organization.\n","tags":["subpackage_voiceCloning"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"List of voice clones.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Voice Cloning_listVoiceClones_Response_200"}}}},"401":{"description":"Unauthorized.","content":{"application/json":{"schema":{"description":"Any type"}}}},"500":{"description":"Server error.","content":{"application/json":{"schema":{"description":"Any type"}}}}}}},"/waves/v1/lightning-large":{"delete":{"operationId":"delete-voice-clone","summary":"Delete a Voice Clone","description":"Delete a voice clone by `voiceId`. Despite the `/lightning-large/`\npath, this endpoint deletes any voice clone on the organization,\nincluding clones created via `POST /waves/v1/voice-cloning`.\n","tags":["subpackage_voiceCloning"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Voice clone deleted successfully","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Voice Cloning_deleteVoiceClone_Response_200"}}}},"400":{"description":"Bad request (Invalid voice ID or validation error)","content":{"application/json":{"schema":{"$ref":"#/components/schemas/DeleteVoiceCloneRequestBadRequestError"}}}},"401":{"description":"Unauthorized","content":{"application/json":{"schema":{"$ref":"#/components/schemas/DeleteVoiceCloneRequestUnauthorizedError"}}}},"500":{"description":"Server error occurred","content":{"application/json":{"schema":{"$ref":"#/components/schemas/DeleteVoiceCloneRequestInternalServerError"}}}}},"requestBody":{"content":{"application/json":{"schema":{"type":"object","properties":{"voiceId":{"type":"string","description":"The unique identifier of the voice clone to delete."}},"required":["voiceId"]}}}}}},"/waves/v1/lightning-large/add_voice":{"post":{"operationId":"add-voice-to-model","summary":"Add your Voice (Deprecated)","description":"**Deprecated** — use `POST /waves/v1/voice-cloning` instead. The new\nendpoint defaults to `lightning-v3.1`, supports optional metadata,\nand returns pre-generated sample clips. This endpoint only clones\nonto `lightning-large` and the resulting voices do not work on\n`lightning-v3.1` (returns an empty WAV). Kept live for backward\ncompatibility; new integrations should migrate.\n","tags":["subpackage_voiceCloning"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Voice clone created successfully","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Voice Cloning_addVoiceToModel_Response_200"}}}},"400":{"description":"Bad request or limit exceeded","content":{"application/json":{"schema":{"$ref":"#/components/schemas/AddVoiceToModelRequestBadRequestError"}}}},"401":{"description":"Unauthorized","content":{"application/json":{"schema":{"$ref":"#/components/schemas/AddVoiceToModelRequestUnauthorizedError"}}}},"500":{"description":"Server error occurred","content":{"application/json":{"schema":{"$ref":"#/components/schemas/AddVoiceToModelRequestInternalServerError"}}}}},"requestBody":{"content":{"multipart/form-data":{"schema":{"type":"object","properties":{"displayName":{"type":"string","description":"Display name for the voice clone."},"file":{"type":"string","format":"binary","description":"Audio file to create voice clone from."}},"required":["displayName","file"]}}}}}},"/waves/v1/lightning-large/get_cloned_voices":{"get":{"operationId":"get-cloned-voices","summary":"Get your cloned Voices (Deprecated)","description":"**Deprecated** — use `GET /waves/v1/voice-cloning` instead. The new\nlist endpoint returns the same data plus a `modelIds` array per\nclone. Kept live for backward compatibility.\n","tags":["subpackage_voiceCloning"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Voices retrieved successfully.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Voice Cloning_getClonedVoices_Response_200"}}}},"400":{"description":"Bad request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/GetClonedVoicesRequestBadRequestError"}}}},"401":{"description":"Unauthorized","content":{"application/json":{"schema":{"$ref":"#/components/schemas/GetClonedVoicesRequestUnauthorizedError"}}}},"500":{"description":"Server error occurred","content":{"application/json":{"schema":{"$ref":"#/components/schemas/GetClonedVoicesRequestInternalServerError"}}}}}}},"/waves/v1/pronunciation-dicts":{"get":{"operationId":"get-pronunciation-dicts","summary":"List","description":"Retrieve all pronunciation dictionaries for the authenticated user","tags":["subpackage_pronunciationDictionaries"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"List of pronunciation dictionaries","content":{"application/json":{"schema":{"type":"array","items":{"$ref":"#/components/schemas/PronunciationDict"}}}}},"401":{"description":"Unauthorized - Invalid or missing authentication","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"500":{"description":"Internal server error","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}}}},"post":{"operationId":"create-pronunciation-dict","summary":"Create","description":"Create a new pronunciation dictionary for the authenticated user","tags":["subpackage_pronunciationDictionaries"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Successfully created pronunciation dictionary","content":{"application/json":{"schema":{"$ref":"#/components/schemas/PronunciationDict"}}}},"400":{"description":"Bad request - Invalid request body","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"401":{"description":"Unauthorized - Invalid or missing authentication","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"500":{"description":"Internal server error","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/CreatePronunciationDictRequest"}}}}},"put":{"operationId":"update-pronunciation-dict","summary":"Update","description":"Update an existing pronunciation dictionary for the authenticated user","tags":["subpackage_pronunciationDictionaries"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Successfully updated pronunciation dictionary","content":{"application/json":{"schema":{"$ref":"#/components/schemas/UpdatePronunciationDictResponse"}}}},"400":{"description":"Bad request - Invalid request body","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"401":{"description":"Unauthorized - Invalid or missing authentication","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"500":{"description":"Internal server error","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/UpdatePronunciationDictRequest"}}}}},"delete":{"operationId":"delete-pronunciation-dict","summary":"Delete","description":"Delete an existing pronunciation dictionary for the authenticated user","tags":["subpackage_pronunciationDictionaries"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Successfully deleted pronunciation dictionary","content":{"application/json":{"schema":{"$ref":"#/components/schemas/DeletePronunciationDictResponse"}}}},"400":{"description":"Bad request - Invalid request body","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"401":{"description":"Unauthorized - Invalid or missing authentication","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"500":{"description":"Internal server error","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/DeletePronunciationDictRequest"}}}}}}},"servers":[{"url":"https://api.smallest.ai"}],"components":{"schemas":{"WavesV1LightningV31GetSpeechPostParametersAccept":{"type":"string","enum":["audio/wav"],"default":"audio/wav","title":"WavesV1LightningV31GetSpeechPostParametersAccept"},"LightningV31RequestSampleRate":{"type":"string","enum":["8000","16000","24000","44100"],"description":"The sample rate for the generated audio.","title":"LightningV31RequestSampleRate"},"LightningV31RequestLanguage":{"type":"string","enum":["auto","en","hi","mr","kn","ta","bn","gu","te","ml","pa","or","es"],"default":"en","description":"Language code for synthesis. Influences pronunciation, number/date\nnormalization, and phoneme selection.\n\n- **Indian:** `en`, `hi`, `mr` (Marathi), `kn` (Kannada), `ta` (Tamil),\n  `bn` (Bengali), `gu` (Gujarati), `te` (Telugu), `ml` (Malayalam),\n  `pa` (Punjabi), `or` (Odia)\n- **European:** `es` (Spanish)\n- `auto` — auto-detect from input text (recommended for code-switching)\n","title":"LightningV31RequestLanguage"},"LightningV31RequestOutputFormat":{"type":"string","enum":["mp3","pcm","wav","ulaw","alaw"],"default":"pcm","description":"Format of the returned audio. `pcm` is the lowest-latency option\nbut requires a decoder to play; `mp3` and `wav` are directly\nplayable in browsers and most media players. The server default\nis `pcm` when the field is omitted — the API playground uses\n`mp3` so the generated audio is directly playable.\n","title":"LightningV31RequestOutputFormat"},"LightningV31Request":{"type":"object","properties":{"text":{"type":"string","default":"Hey i am your a text to speech model","description":"The text to convert to speech."},"voice_id":{"type":"string","default":"daniel","description":"The voice identifier to use for speech generation."},"sample_rate":{"$ref":"#/components/schemas/LightningV31RequestSampleRate","default":44100,"description":"The sample rate for the generated audio."},"speed":{"type":"number","format":"double","default":1,"description":"The speed of the generated speech."},"language":{"$ref":"#/components/schemas/LightningV31RequestLanguage","default":"en","description":"Language code for synthesis. Influences pronunciation, number/date\nnormalization, and phoneme selection.\n\n- **Indian:** `en`, `hi`, `mr` (Marathi), `kn` (Kannada), `ta` (Tamil),\n  `bn` (Bengali), `gu` (Gujarati), `te` (Telugu), `ml` (Malayalam),\n  `pa` (Punjabi), `or` (Odia)\n- **European:** `es` (Spanish)\n- `auto` — auto-detect from input text (recommended for code-switching)\n"},"output_format":{"$ref":"#/components/schemas/LightningV31RequestOutputFormat","default":"pcm","description":"Format of the returned audio. `pcm` is the lowest-latency option\nbut requires a decoder to play; `mp3` and `wav` are directly\nplayable in browsers and most media players. The server default\nis `pcm` when the field is omitted — the API playground uses\n`mp3` so the generated audio is directly playable.\n"},"pronunciation_dicts":{"type":"array","items":{"type":"string"},"description":"The IDs of the pronunciation dictionaries to use for speech generation."},"session_id":{"type":"string","description":"Optional client-provided session identifier for correlation. Only alphanumeric characters, hyphens, underscores, and dots are allowed. Max 128 characters. Echoed back in response headers as `X-External-Session-Id`."},"request_id":{"type":"string","description":"Optional client-provided request identifier for correlation. Only alphanumeric characters, hyphens, underscores, and dots are allowed. Max 128 characters. Echoed back in response headers as `X-External-Request-Id`."}},"required":["text","voice_id"],"title":"LightningV31Request"},"SynthesizeLightningV31SpeechRequestBadRequestError":{"type":"object","properties":{"error":{"type":"string","description":"Error type."},"message"