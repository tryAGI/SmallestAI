{"openapi":"3.1.0","info":{"title":"API Reference","version":"1.0.0"},"paths":{"/waves/v1/tts":{"post":{"operationId":"synthesize-speech","summary":"Synthesize speech","description":"Synthesize speech from text in a single request. Pass `text` + `voice_id`, get back binary audio.\n\nPick the model with the `model` body parameter: default `lightning_v3.1`, or `lightning_v3.1_pro` for the Pro pool. Other request parameters are identical across models.\n\n**Language behaviour on `lightning_v3.1_pro`:** pass `language: en` for UK + American accented English, pass `language: hi` for Indian accented English + Hindi (code-switching), or omit `language` to default to `en + hi` (mixed Indian + Western English coverage). Pro supports 31 languages total (10 Indic, 8 Asian & Middle Eastern, 13 European including Dutch and Swedish). Pass the matching ISO 639-1 code (e.g. `ta`, `de`, `ja`) with a Pro voice from that language, or use `auto` to route across all supported languages with any English or Hindi voice. See the [Lightning v3.1 Pro model card](/models/model-cards/text-to-speech/lightning-v-3-1-pro#supported-languages) for the full list. On `lightning_v3.1` the model accepts 20 language codes (10 European + 10 Indic) plus `auto`; the trained voice catalog covers 12 of those directly.\n\n## When to use this\n\n- **Use this** for short utterances you can render before playback (notifications, prompts, batch jobs, audio file generation).\n- **Use `/waves/v1/tts/live`** when you want playback to start before the full audio is ready (long passages, latency-sensitive apps).\n- **Use `/waves/v1/tts/live`** (WebSocket) when text arrives incrementally (LLM token streams, live captioning).\n\n## Key features\n\n- 44 kHz natural, expressive synthesis\n- Model selectable per request via `model` body parameter\n- Cloned voice IDs (`voice_*`) work on `lightning_v3.1` — same param as catalog voices\n- 20 accepted language codes on `lightning_v3.1` (12 with trained voices, 8 additional routed via English/Hindi voices). On `lightning_v3.1_pro`: 31 languages with dedicated voices (10 Indic, 8 Asian & Middle Eastern, 13 European); `language: en` → UK + American accented English; `language: hi` → Indian accented English + Hindi; omit `language` → defaults to `en + hi`. Both models accept `language: auto` for cross-language routing.\n- Output formats: `pcm`, `mp3`, `wav`, `ulaw`, `alaw`\n- Sample rates: 8 kHz – 44.1 kHz\n- Speed: 0.5× – 2×\n- Per-call pronunciation dictionaries via `pronunciation_dicts`\n\n## Examples\n\n**cURL — Lightning v3.1 (default)**\n```bash\ncurl -X POST \"https://api.smallest.ai/waves/v1/tts\" \\\n  -H \"Authorization: Bearer $SMALLEST_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Accept: audio/wav\" \\\n  -d '{\n    \"text\": \"Hello from Waves TTS.\",\n    \"voice_id\": \"magnus\",\n    \"sample_rate\": 24000,\n    \"output_format\": \"wav\"\n  }' --output speech.wav\n```\n\n**cURL — Lightning v3.1 Pro (omit `language` → defaults to `en + hi`)**\n```bash\ncurl -X POST \"https://api.smallest.ai/waves/v1/tts\" \\\n  -H \"Authorization: Bearer $SMALLEST_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Accept: audio/wav\" \\\n  -d '{\n    \"text\": \"Hello from the Lightning v3.1 Pro pool.\",\n    \"voice_id\": \"meher\",\n    \"model\": \"lightning_v3.1_pro\",\n    \"sample_rate\": 24000,\n    \"output_format\": \"wav\"\n  }' --output speech.wav\n```\n\n**cURL — Lightning v3.1 Pro with explicit `language: en` (UK + American accented English)**\n```bash\ncurl -X POST \"https://api.smallest.ai/waves/v1/tts\" \\\n  -H \"Authorization: Bearer $SMALLEST_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Accept: audio/wav\" \\\n  -d '{\n    \"text\": \"Good morning, this is a Pro voice speaking.\",\n    \"voice_id\": \"meher\",\n    \"model\": \"lightning_v3.1_pro\",\n    \"language\": \"en\",\n    \"sample_rate\": 24000,\n    \"output_format\": \"wav\"\n  }' --output speech.wav\n```\n\n**cURL — Lightning v3.1 Pro with explicit `language: hi` (Indian accented English + Hindi)**\n```bash\ncurl -X POST \"https://api.smallest.ai/waves/v1/tts\" \\\n  -H \"Authorization: Bearer $SMALLEST_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Accept: audio/wav\" \\\n  -d '{\n    \"text\": \"Namaste, this is an Indian-accented Pro voice.\",\n    \"voice_id\": \"meher\",\n    \"model\": \"lightning_v3.1_pro\",\n    \"language\": \"hi\",\n    \"sample_rate\": 24000,\n    \"output_format\": \"wav\"\n  }' --output speech.wav\n```\n\n## Common gotchas\n\n- **Set `Accept: audio/wav`.** Omitting it can return an empty or unplayable response.\n- **Pair voice IDs with the right model.** Voice catalogs differ between `lightning_v3.1` and `lightning_v3.1_pro`. The API does not reject mismatched pairings, but using a Pro-only `voice_id` with `model=lightning_v3.1` (or omitting `model`) can return wrong or hallucinated audio. Pair Pro voices with `model=lightning_v3.1_pro`; standard catalog voices with `model=lightning_v3.1` (the default).\n- **Cloned voices** (`voice_*` from `add_voice`) work with `lightning_v3.1` only; voice cloning is not available on `lightning_v3.1_pro`.\n- **44.1 kHz output** is supported but most playback environments are happy with 24 kHz — drop the sample rate if bandwidth matters.\n","tags":["textToSpeech"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}},{"name":"Accept","in":"header","description":"Must be `audio/wav` to receive binary audio. Required for proper playback.","required":true,"schema":{"$ref":"#/components/schemas/WavesV1TtsPostParametersAccept"}}],"responses":{"200":{"description":"Synthesized speech retrieved successfully.","content":{"application/octet-stream":{"schema":{"type":"string","format":"binary"}}}},"400":{"description":"Bad request.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/TtsError"}}}},"401":{"description":"Unauthorized.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/TtsError"}}}},"500":{"description":"Server error occurred.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/TtsError"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/TtsRequest"}}}}}},"/waves/v1/tts/live":{"post":{"operationId":"synthesize-speech-sse","summary":"Stream speech (SSE)","description":"Synthesize speech and stream the audio back over Server-Sent Events. Same body as `/waves/v1/tts` — the only difference is the response is a stream of base64-encoded PCM chunks instead of one binary blob.\n\nPick the model with the `model` body parameter, same as the sync route.\n\n<Note>\n  **The same URL serves the WebSocket endpoint.** `wss://api.smallest.ai/waves/v1/tts/live` accepts a WebSocket upgrade for streaming-text scenarios (LLM token streams, live captioning). The HTTP `POST` documented on this page returns SSE; use `wss://` to use the WebSocket protocol instead. See the [WebSocket reference](/models/api-reference/text-to-speech/stream-speech-web-socket).\n</Note>\n\n## When to use this\n\n- **Use this** when you want playback to start before synthesis is complete — long passages, latency-sensitive UI, live narration.\n- **Use sync `/waves/v1/tts`** when total latency doesn't matter and you'd rather get one buffer.\n- **Use `/waves/v1/tts/live`** (WebSocket) when the *text* arrives incrementally (LLM token stream). SSE assumes you have the full text up front.\n\n## How it works\n\n1. POST your text + voice settings — same payload as `/waves/v1/tts`, plus optional `model`.\n2. The response is `Content-Type: text/event-stream`. Each chunk frame is `event: audio\\n` followed by `data: {\"audio\": \"<base64-pcm>\"}\\n\\n`.\n3. Decode each chunk's `audio` field with base64 and feed the PCM bytes to your audio pipeline (browser `MediaSource`, ffmpeg pipe, raw PCM player, etc.).\n4. A final `data: {\"done\": true}\\n\\n` frame marks end of stream.\n\n## Examples\n\n**cURL**\n```bash\ncurl -N -X POST \"https://api.smallest.ai/waves/v1/tts/live\" \\\n  -H \"Authorization: Bearer $SMALLEST_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"text\": \"Streaming this paragraph chunk by chunk so playback can start sooner.\",\n    \"voice_id\": \"magnus\",\n    \"sample_rate\": 24000,\n    \"output_format\": \"pcm\"\n  }'\n```\n\n## Common gotchas\n\n- **Use a streaming-friendly client.** `curl -N`, Python `iter_lines`, or a `fetch` `ReadableStream` reader. Buffering clients will hide the latency win.\n- **Audio is base64 inside the event payload**, not the raw event bytes. Decode the `data.audio` field per event.\n- **`output_format=pcm`** gives the lowest overhead for streaming playback. `wav`/`mp3` work but add per-chunk framing bytes.\n","tags":["textToSpeech"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Synthesized speech retrieved successfully.","content":{"text/event-stream":{"schema":{"type":"string"}}}},"400":{"description":"Bad request.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/TtsError"}}}},"401":{"description":"Unauthorized.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/TtsError"}}}},"500":{"description":"Server error occurred.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/TtsError"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/TtsRequest"}}}}}},"/waves/v1/{model}/get_voices":{"get":{"operationId":"get-waves-voices","summary":"Get Voices","description":"List voices available for Lightning v3.1. The response is the union of the standard and Pro voice catalogs — the API does not return a per-voice \"is Pro\" flag, so consult the [Lightning v3.1 Pro](/models/model-cards/text-to-speech/lightning-v-3-1-pro) and [Lightning v3.1](/models/model-cards/text-to-speech/lightning-v-3-1) model cards for the canonical per-pool voice lists. Use the `voice_id` from this response together with `\"model\": \"lightning_v3.1\"` (default) or `\"model\": \"lightning_v3.1_pro\"` on the unified `/waves/v1/tts` route to pick the pool.\n","tags":["voices"],"parameters":[{"name":"model","in":"path","description":"The catalog to query. Currently only `lightning-v3.1` is supported — the response returns the union of standard Lightning v3.1 voices and Lightning v3.1 Pro voices. The API does not include a per-voice Pro flag; consult the model cards for the canonical per-pool catalogs.\n","required":true,"schema":{"$ref":"#/components/schemas/WavesV1ModelGetVoicesGetParametersModel"}},{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Voices retrieved successfully.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Voices_getWavesVoices_Response_200"}}}},"400":{"description":"Bad request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/GetWavesVoicesRequestBadRequestError"}}}},"401":{"description":"Unauthorized","content":{"application/json":{"schema":{"$ref":"#/components/schemas/GetWavesVoicesRequestUnauthorizedError"}}}},"500":{"description":"Server error occurred","content":{"application/json":{"schema":{"$ref":"#/components/schemas/GetWavesVoicesRequestInternalServerError"}}}}}}},"/waves/v1/voice-cloning":{"post":{"operationId":"create-voice-clone","summary":"Create a Voice Clone","description":"Create an instant voice clone in a single call. Defaults to `lightning-v3.1`.\n","tags":["voiceCloning"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Voice clone created. Includes pre-generated sample clips of the new voice.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Voice Cloning_createVoiceClone_Response_200"}}}},"400":{"description":"Validation error. Common causes: no file provided, invalid MIME type,\nfile too large, clone limit exceeded, invalid language, or\n`model=lightning-v2` (deprecated).\n","content":{"application/json":{"schema":{"$ref":"#/components/schemas/CreateVoiceCloneRequestBadRequestError"}}}},"401":{"description":"Unauthorized — missing or invalid API key.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/CreateVoiceCloneRequestUnauthorizedError"}}}},"500":{"description":"Server error. The `error_code` field may be populated for known failure modes.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/CreateVoiceCloneRequestInternalServerError"}}}}},"requestBody":{"content":{"multipart/form-data":{"schema":{"type":"object","properties":{"displayName":{"type":"string","description":"Human-readable name for the voice clone."},"file":{"type":"string","format":"binary","description":"Audio file to clone from. Supported MIME types:\n`audio/mpeg`, `audio/mpeg-3`, `audio/wav`, `audio/wave`,\n`audio/webm`, `video/webm`, `audio/mp4`, `video/mp4`.\nMaximum size: 5 MB.\n"},"description":{"type":"string","description":"Optional longer description for the voice clone."},"accent":{"type":"string","description":"Optional accent tag (e.g. \"general\", \"indian\")."},"tags":{"type":"string","description":"Optional comma-separated list of tags. Server splits on\ncommas and trims whitespace (`\"en, tone-test\"` → `[\"en\", \"tone-test\"]`).\n"},"language":{"type":"string","description":"Primary language the clone will be used for. Optional, but\n**strongly recommended** — set it to the language of your\nreference audio. The TTS request's `language` should also\nmatch this code; setting it now avoids silent language\nmismatches at inference time.\n\nMust be one of the languages supported by `lightning-v3.1`\n(e.g. `en`, `hi`). The server validates and rejects\nunsupported codes with a 400.\n"},"model":{"$ref":"#/components/schemas/WavesV1VoiceCloningPostRequestBodyContentMultipartFormDataSchemaModel","default":"lightning-v3.1","description":"Voice cloning model. Defaults to `lightning-v3.1`.\n`lightning-v2` is accepted by the schema for historical\nreasons but is deprecated — the server returns 400 with\n`\"Voice cloning for lightning-v2 is deprecated. Please use lightning-v3.1\"`.\n"}},"required":["displayName","file"]}}}}},"get":{"operationId":"list-voice-clones","summary":"List Voice Clones","description":"Retrieve all voice clones in your organization.\n","tags":["voiceCloning"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"List of voice clones.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Voice Cloning_listVoiceClones_Response_200"}}}},"401":{"description":"Unauthorized.","content":{"application/json":{"schema":{"description":"Any type"}}}},"500":{"description":"Server error.","content":{"application/json":{"schema":{"description":"Any type"}}}}}}},"/waves/v1/pronunciation-dicts":{"get":{"operationId":"get-pronunciation-dicts","summary":"List","description":"Retrieve all pronunciation dictionaries for the authenticated user","tags":["pronunciationDictionaries"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"List of pronunciation dictionaries","content":{"application/json":{"schema":{"type":"array","items":{"$ref":"#/components/schemas/PronunciationDict"}}}}},"401":{"description":"Unauthorized - Invalid or missing authentication","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"500":{"description":"Internal server error","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}}}},"post":{"operationId":"create-pronunciation-dict","summary":"Create","description":"Create a new pronunciation dictionary for the authenticated user","tags":["pronunciationDictionaries"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Successfully created pronunciation dictionary","content":{"application/json":{"schema":{"$ref":"#/components/schemas/PronunciationDict"}}}},"400":{"description":"Bad request - Invalid request body","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"401":{"description":"Unauthorized - Invalid or missing authentication","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"500":{"description":"Internal server error","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/CreatePronunciationDictRequest"}}}}},"put":{"operationId":"update-pronunciation-dict","summary":"Update","description":"Update an existing pronunciation dictionary for the authenticated user","tags":["pronunciationDictionaries"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Successfully updated pronunciation dictionary","content":{"application/json":{"schema":{"$ref":"#/components/schemas/UpdatePronunciationDictResponse"}}}},"400":{"description":"Bad request - Invalid request body","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"401":{"description":"Unauthorized - Invalid or missing authentication","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"500":{"description":"Internal server error","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/UpdatePronunciationDictRequest"}}}}},"delete":{"operationId":"delete-pronunciation-dict","summary":"Delete","description":"Delete an existing pronunciation dictionary for the authenticated user","tags":["pronunciationDictionaries"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Successfully deleted pronunciation dictionary","content":{"application/json":{"schema":{"$ref":"#/components/schemas/DeletePronunciationDictResponse"}}}},"400":{"description":"Bad request - Invalid request body","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"401":{"description":"Unauthorized - Invalid or missing authentication","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"500":{"description":"Internal server error","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/DeletePronunciationDictRequest"}}}}}},"/waves/v1/stt/":{"post":{"operationId":"transcribe","summary":"Transcribe (Pre-recorded)","description":"Transcribe an audio file. The model is chosen via `?model=`:\n\n- `?model=pulse-pro`: English-only, leaderboard-ranked accuracy. Raw bytes only; pass `webhook_url` to receive transcription asynchronously on long files.\n- `?model=pulse`: multilingual transcription (21 streaming + 26 pre-recorded languages), supports both raw bytes and audio-by-URL.\n\n## When to use this\n\nUse this endpoint when you have a complete audio file (call recording, voicemail, podcast episode) and want the transcript back in one response. For live transcription as audio arrives, use the realtime WebSocket endpoint (`WS /waves/v1/stt/live`) instead.\n\nPulse Pro has no streaming worker today; calls to `WS /waves/v1/stt/live?model=pulse-pro` return `400` before the WebSocket upgrades.\n\n## Input methods\n\n- **Raw bytes**: `Content-Type: application/octet-stream` with the audio in the body. All knobs are query parameters.\n- **URL (`?model=pulse` only)**: `Content-Type: application/json` with `{\"url\": \"...\"}` in the body.\n\n## Examples\n\n**cURL**: Pulse Pro, sync\n```bash\ncurl -X POST \"https://api.smallest.ai/waves/v1/stt/?model=pulse-pro&language=en&word_timestamps=true\" \\\n  -H \"Authorization: Bearer $SMALLEST_API_KEY\" \\\n  -H \"Content-Type: application/octet-stream\" \\\n  --data-binary \"@./call.wav\"\n```\n\n**cURL**: Pulse Pro, async via webhook\n```bash\ncurl -X POST \"https://api.smallest.ai/waves/v1/stt/?model=pulse-pro&language=en&webhook_url=https://your.app/cb\" \\\n  -H \"Authorization: Bearer $SMALLEST_API_KEY\" \\\n  -H \"Content-Type: application/octet-stream\" \\\n  --data-binary \"@./call.wav\"\n```\nReturns `200 { \"status\": \"processing\", \"request_id\": \"...\" }` immediately. The webhook receives the full transcription when ready.\n\n**cURL**: Pulse, audio-by-URL\n```bash\ncurl -X POST \"https://api.smallest.ai/waves/v1/stt/?model=pulse&language=en\" \\\n  -H \"Authorization: Bearer $SMALLEST_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"url\": \"https://your-bucket.s3.amazonaws.com/call.wav\"}'\n```\n\n**Python**\n```python\nimport requests\n\nwith open(\"./call.wav\", \"rb\") as f:\n    audio = f.read()\n\nr = requests.post(\n    \"https://api.smallest.ai/waves/v1/stt/\",\n    params={\"model\": \"pulse-pro\", \"language\": \"en\", \"word_timestamps\": \"true\"},\n    headers={\"Authorization\": f\"Bearer {API_KEY}\", \"Content-Type\": \"application/octet-stream\"},\n    data=audio,\n)\nr.raise_for_status()\nprint(r.json()[\"transcription\"])\n```\n\n**JavaScript / TypeScript**\n```typescript\nimport { readFileSync } from \"node:fs\";\n\nconst audio = readFileSync(\"./call.wav\");\nconst params = new URLSearchParams({ model: \"pulse-pro\", language: \"en\", word_timestamps: \"true\" });\n\nconst res = await fetch(`https://api.smallest.ai/waves/v1/stt/?${params}`, {\n  method: \"POST\",\n  headers: { Authorization: `Bearer ${process.env.SMALLEST_API_KEY}`, \"Content-Type\": \"application/octet-stream\" },\n  body: audio,\n});\nconsole.log((await res.json()).transcription);\n```\n\n## Common gotchas\n\n- **`model` is required.** Missing or invalid values return `400` with an enum-validation error.\n- **Pulse Pro is English only.** Pass `language=en`. Other language codes are accepted at the wire level but produce unpredictable output.\n- **Pulse Pro does not support audio-by-URL.** Send raw bytes or use `?model=pulse` for the URL flow.\n- **Async (webhook) mode is Pulse Pro only.** Pulse runs sync only on this endpoint.\n- **Max payload 250 MB.** Larger requests return `413`. Compress to mono 16 kHz PCM if you are close to the limit; quality is unaffected.\n","tags":["speechToText"],"parameters":[{"name":"model","in":"query","description":"Selects which ASR model handles the request. Required; missing or invalid values return `400`.\n\n- `pulse-pro`: English only, leaderboard-ranked accuracy, raw bytes only; supports async via `webhook_url`.\n- `pulse`: multilingual (39 languages), raw bytes OR URL.\n","required":true,"schema":{"$ref":"#/components/schemas/WavesV1SttPostParametersModel"}},{"name":"language","in":"query","description":"Language of the audio file. This endpoint is **Pre-Recorded (HTTP)** — for streaming, switch to `WSS /waves/v1/stt/live` (different supported language set).\n\n**26 single-language codes:** `en`, `hi`, `de`, `es`, `ru`, `it`, `fr`, `nl`, `pt`, `uk`, `pl`, `cs`, `sk`, `lv`, `et`, `ro`, `fi`, `sv`, `bg`, `hu`, `da`, `lt`, `mt`, `zh`, `ja`, `ko`.\n\n**Regional auto-detect aggregators** for unknown audio:\n- `multi-eu` — auto-detects across all 21 European codes plus `en`.\n- `multi-asian` — auto-detects across `zh`, `ko`, `ja`, `en`.\n- `multi-indic`: auto-detects across `en`, `hi`, `gu`, `mr`, `bn`, `or`. India region only.\n\n- **Pulse Pro**: pass `en`.\n- **Pulse**: pass any of the single-language codes above, or use the `multi-eu` / `multi-asian` / `multi-indic` aggregator for unknown audio. See the [Pulse model card](/models/model-cards/speech-to-text/pulse) for the full table with language names.\n","required":true,"schema":{"$ref":"#/components/schemas/WavesV1SttPostParametersLanguage"}},{"name":"word_timestamps","in":"query","description":"Include the per-word `words[]` array in the response — each entry carries the recognized `word`, its `start`/`end` timestamps, and a per-word `confidence` score (0.0–1.0). With `diarize=true`, entries also include `speaker`. On Pulse Pro this costs roughly one-third of throughput.","required":false,"schema":{"type":"boolean","default":false}},{"name":"diarize","in":"query","description":"Multi-speaker identification; adds per-word and per-utterance speaker labels.","required":false,"schema":{"type":"boolean","default":false}},{"name":"webhook_url","in":"query","description":"Pulse Pro only. If set, the response is `200` with `{\"status\": \"processing\", \"request_id\": \"...\"}` immediately, and the full transcription is delivered to this URL when ready. Use for long files where you do not want to hold an HTTP connection open.\n","required":false,"schema":{"type":"string","format":"uri"}},{"name":"webhook_method","in":"query","description":"HTTP method to use when calling the webhook. Pulse Pro only.","required":false,"schema":{"$ref":"#/components/schemas/WavesV1SttPostParametersWebhookMethod","default":"POST"}},{"name":"webhook_extra","in":"query","description":"Arbitrary metadata returned to the webhook in addition to the transcription payload. Pulse Pro only.","required":false,"schema":{"type":"string"}},{"name":"redact_pii","in":"query","description":"Redact personally identifiable information from the transcript.\nNames → `[FIRSTNAME_*]` / `[LASTNAME_*]`, phone numbers →\n`[PHONENUMBER_*]`, addresses → `[ADDRESS_*]`, etc. The redaction\ntokens use sequential indices so multiple occurrences of the same\nentity get distinct labels (`[FIRSTNAME_1]`, `[FIRSTNAME_2]`).\n\n**Language support:** currently effective only on `en` and `hi`.\nSetting `redact_pii=true` on other language codes is accepted\nbut does not redact.\n","required":false,"schema":{"$ref":"#/components/schemas/WavesV1SttPostParametersRedactPii","default":"false"}},{"name":"redact_pci","in":"query","description":"Redact payment card information (credit-card numbers, CVV, account\nnumbers, etc.). Replaces matches with `[ACCOUNTNUMBER_*]` tokens.\nUse alongside `redact_pii=true` for full PCI-compliant transcript\nhandling.\n\n**Language support:** currently effective only on `en` and `hi`.\nSetting `redact_pci=true` on other language codes is accepted\nbut does not redact.\n","required":false,"schema":{"$ref":"#/components/schemas/WavesV1SttPostParametersRedactPci","default":"false"}},{"name":"emotion_detection","in":"query","description":"When `true`, the response adds an `emotions` object mapping detected\nemotion labels to confidence scores. Useful for voice-of-customer\nanalytics on call recordings.\n","required":false,"schema":{"$ref":"#/components/schemas/WavesV1SttPostParametersEmotionDetection","default":"false"}},{"name":"gender_detection","in":"query","description":"When `true`, the response adds a `gender` field with the detected\nspeaker gender label. Pulse pre-recorded only.\n","required":false,"schema":{"$ref":"#/components/schemas/WavesV1SttPostParametersGenderDetection","default":"false"}},{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Transcription succeeded. The response body has two shapes:\n\n- **Sync**: full `TranscriptionResponse` with `transcription`, `words`, `metadata`, etc. Returned when `webhook_url` is not set (all `?model=pulse` requests, and `?model=pulse-pro` requests without a webhook).\n- **Async**: `{ \"status\": \"processing\", \"request_id\": \"...\" }`. Returned when `?model=pulse-pro` is paired with `webhook_url`. The full `TranscriptionResponse` then arrives on the webhook when ready.\n","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Speech to Text_transcribe_Response_200"}}}},"400":{"description":"Missing or invalid `model` query parameter, invalid params, or unsupported feature combination (e.g. `?model=pulse-pro` on the WS endpoint, audio-by-URL with `?model=pulse-pro`).","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"401":{"description":"API key missing or invalid.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"403":{"description":"Plan does not include access to the requested model.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"413":{"description":"Payload exceeds 250 MB.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"429":{"description":"RPM cap exceeded (Standard plan default 25/min per model).","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"503":{"description":"Worker temporarily unavailable.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}}},"requestBody":{"content":{"application/octet-stream":{"schema":{"type":"string","format":"binary"}}}}}},"/waves/v1/chat/completions":{"post":{"operationId":"electron-chat-completions","summary":"Chat Completions (Electron)","description":"Generate a chat completion with Electron. OpenAI-compatible\nrequest/response shape — point any OpenAI SDK at\n`https://api.smallest.ai/waves/v1` and it just works.\n\nSet `stream: true` to receive tokens via Server-Sent Events. With\n`stream_options: { include_usage: true }`, the final SSE chunk\ncarries the `usage` block so token accounting is exact even on\nclient disconnects.\n\nTool calling follows OpenAI's `tools` array convention. When you\nprovide a voice-agent-style system prompt, Electron emits a short\nfiller phrase in the assistant message `content` field alongside\n`tool_calls` — see the [Tool Calling guide](/models/documentation/llm-electron/tool-function-calling)\nfor the voice-agent pattern.\n\n## Examples\n\n**cURL**\n```bash\ncurl -X POST \"https://api.smallest.ai/waves/v1/chat/completions\" \\\n  -H \"Authorization: Bearer $SMALLEST_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"model\": \"electron\",\n    \"messages\": [\n      {\"role\": \"user\", \"content\": \"Write one sentence about why the sky is blue.\"}\n    ]\n  }'\n```\n\n**Python** (`pip install openai`)\n```python\nimport os\nfrom openai import OpenAI\n\nclient = OpenAI(\n    base_url=\"https://api.smallest.ai/waves/v1\",\n    api_key=os.environ[\"SMALLEST_API_KEY\"],\n)\n\nresponse = client.chat.completions.create(\n    model=\"electron\",\n    messages=[\n        {\"role\": \"user\", \"content\": \"Write one sentence about why the sky is blue.\"}\n    ],\n)\n\nprint(response.choices[0].message.content)\n```\n\n**JavaScript / TypeScript** (`npm install openai`)\n```typescript\nimport OpenAI from \"openai\";\n\nconst client = new OpenAI({\n  baseURL: \"https://api.smallest.ai/waves/v1\",\n  apiKey: process.env.SMALLEST_API_KEY,\n});\n\nconst response = await client.chat.completions.create({\n  model: \"electron\",\n  messages: [\n    { role: \"user\", content: \"Write one sentence about why the sky is blue.\" },\n  ],\n});\n\nconsole.log(response.choices[0].message.content);\n```\n\n**Streaming with usage** (Python)\n```python\nstream = client.chat.completions.create(\n    model=\"electron\",\n    messages=[{\"role\": \"user\", \"content\": \"Tell me a one-sentence fun fact.\"}],\n    stream=True,\n    stream_options={\"include_usage\": True},\n)\nfor chunk in stream:\n    if chunk.choices and chunk.choices[0].delta.content:\n        print(chunk.choices[0].delta.content, end=\"\", flush=True)\n    if chunk.usage:\n        print(f\"\\n\\nTokens: {chunk.usage.total_tokens}\")\n```\n\n## Common gotchas\n\n- **Base URL is `/waves/v1`**, not `/v1`. The OpenAI SDK appends `/chat/completions` for you.\n- **`stream_options.include_usage: true`** is required for exact token accounting on streaming calls — the final SSE chunk carries the `usage` block.\n- **`n > 1` and `prompt_logprobs` are rejected.** Use multiple requests if you need parallel completions.\n- **Auth header is `Authorization: Bearer $SMALLEST_API_KEY`** — get the key from the [Smallest AI Console](https://app.smallest.ai/dashboard/api-keys).\n","tags":["llm"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Non-streaming: standard OpenAI `chat.completion` object.\n\nStreaming (`stream: true`): `text/event-stream` SSE — each\nevent is a `chat.completion.chunk` delta, terminated by\n`data: [DONE]`.\n","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ChatCompletion"}}}},"400":{"description":"Bad request — schema validation, unsupported parameter\n(`n > 1`, `prompt_logprobs`), context length exceeded, or\ninvalid field value forwarded by the model.\n","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"401":{"description":"Missing or invalid API key.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"403":{"description":"API key valid but no access to Electron on this plan.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"429":{"description":"Rate limit (RPM) or concurrency cap hit. See\n[Concurrency and Limits](/models/api-reference/concurrency-and-limits).\n","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"502":{"description":"Upstream model unavailable. Retry with backoff.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"503":{"description":"Endpoint temporarily disabled, or upstream model overloaded.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/ChatCompletionRequest"}}}}}}},"servers":[{"url":"https://api.smallest.ai","description":"waves"}],"components":{"schemas":{"WavesV1TtsPostParametersAccept":{"type":"string","enum":["audio/wav"],"default":"audio/wav","title":"WavesV1TtsPostParametersAccept"},"TtsRequestModel":{"type":"string","enum":["lightning_v3.1","lightning_v3.1_pro"],"default":"lightning_v3.1","description":"TTS model to route the request to. Controls which model pool serves\nthis synthesis.\n\n- `lightning_v3.1` (default) — standard Lightning v3.1.\n- `lightning_v3.1_pro` — Lightning v3.1 Pro pool. Improved audio\n  quality and naturalness, with a curated voice catalog. See the\n  [Lightning v3.1 Pro model card](/models/model-cards/text-to-speech/lightning-v-3-1-pro)\n  for supported voice IDs.\n\nSame concurrency and latency profile across both. Other request\nparameters behave identically.\n","title":"TtsRequestModel"},"TtsRequestSampleRate":{"type":"string","enum":["8000","16000","24000","44100"],"description":"The sample rate for the generated audio.","title":"TtsRequestSampleRate"},"TtsRequestLanguage":{"type":"string","enum":["auto","en","hi","mr","kn","ta","bn","gu","te","ml","pa","or","es","de","fr","it","nl","sv","pt","ru","el","fi","no","pl","ar","zh","id","ja","ko","ms","tr","vi"],"description":"Language code for synthesis. Influences pronunciation, number/date\nnormalization, and phoneme selection.\n\n**Default on `lightning_v3.1_pro`:** when `language` is omitted, the\nPro pool defaults to **`en + hi`** (mixed Indian + Western English\ncoverage, auto-detected from the input text).\n\nEach voice has its own `tags.language` set in the voice catalog —\nquery `GET /waves/v1/lightning-v3.1/get_voices`. Pass a language\nthe voice was trained on; passing other codes is accepted by the\nAPI but produces English-pronounced output.\n\n**`auto` (recommended for cross-language use cases):** routes internally\nbased on the input text. Any English or Hindi voice can be used\nacross all supported languages when `auto` is set; the platform\nhandles language-appropriate routing without needing a code per\ncall.\n\n**On `lightning_v3.1`** — 20 supported languages:\n- 10 European: English, Spanish, French, German, Italian, Dutch, Swedish, Portuguese, Polish, Russian\n- 10 Indic: Hindi, Marathi, Gujarati, Punjabi, Bengali, Odia, Tamil, Telugu, Kannada, Malayalam\n\n**On `lightning_v3.1_pro`** — 31 supported languages (adds 11 over base):\n- 13 European: base 10 plus Greek, Finnish, Norwegian\n- 8 Asian & Middle Eastern: Chinese, Japanese, Korean, Indonesian, Malay, Vietnamese, Turkish, Arabic\n- 10 Indic: same as base\n- Pass `en` → UK + American accented English.\n- Pass `hi` → Indian accented English + Hindi (code-switching).\n- Omit `language` → defaults to `en + hi` (mixed Indian + Western English coverage, auto-detected from input text).\n","title":"TtsRequestLanguage"},"TtsRequestNumberPronunciationLanguage":{"type":"string","enum":["auto","en","hi","mr","kn","ta","bn","gu","te","ml","pa","or","es","de","fr","it","nl","sv","pt","ru","el","fi","no","pl","ar","zh","id","ja","ko","ms","tr","vi"],"description":"Optional. Sets the language used to read out numeric content —\nnumbers, currency amounts, times, and the numeric parts of dates\nand years — independently of the synthesis voice. Ordinary words\nare not translated.\n\n- If you **omit `language`**, this value also becomes the\n  synthesis language: model selection and voice routing follow it.\n- If you **set `language` explicitly**, `language` always wins for\n  synthesis and `number_pronunciation_language` only changes how\n  numeric content is normalized. It works both ways — read numbers\n  in Hindi under an English voice, or in English under a Hindi\n  voice (tuned for Indian, often mixed-script, use cases).\n- Omit this field to keep the existing behaviour — normalization\n  follows `language`.\n\nNote: only numeric tokens are re-spoken; the words around them\nstay in the text language. On a cross-language request names may\nalso render in the target script (e.g. \"Smith\" → \"स्मिथ\"), which\nis generally the desired reading for native-language voices.\n\nAccepts the same language codes as `language` (including `auto`,\n`nl`, `sv`).\n","title":"TtsRequestNumberPronunciationLanguage"},"TtsRequestOutputFormat":{"type":"string","enum":["mp3","pcm","wav","ulaw","alaw"],"default":"pcm","description":"Format of the returned audio. `pcm` is the lowest-latency option\nbut requires a decoder to play; `mp3` and `wav` are directly\nplayable in browsers and most media players. The server default\nis `pcm` when the field is omitted — the API playground uses\n`mp3` so the generated audio is directly playable.\n","title":"TtsRequestOutputFormat"},"TtsRequest":{"type":"object","properties":{"text":{"type":"string","default":"Hello from Waves TTS.","description":"The text to convert to speech."},"voice_id":{"type":"string","default":"magnus","description":"The voice identifier to use for speech generation. See the model card for available voices per model."},"model":{"$ref":"#/components/schemas/TtsRequestModel","default":"lightning_v3.1","description":"TTS model to route the request to. Controls which model pool serves\nthis synthesis.\n\n- `lightning_v3.1` (default) — standard Lightning v3.1.\n- `lightning_v3.1_pro` — Lightning v3.1 Pro pool. Improved audio\n  quality and naturalness, with a curated voice catalog. See the\n  [Lightning v3.1 Pro model card](/models/model-cards/text-to-speech/lightning-v-3-1-pro)\n  for supported voice IDs.\n\nSame concurrency and latency profile across both. Other request\nparameters behave identically.\n"},"sample_rate":{"$ref":"#/components/schemas/TtsRequestSampleRate","default":44100,"description":"The sample rate for the generated audio."},"speed":{"type":"number","format":"double","default":1,"description":"The speed of the generated speech."},"language":{"$ref":"#/components/schemas/TtsRequestLanguage","description":"Language code for synthesis. Influences pronunciation, number/date\nnormalization, and phoneme selection.\n\n**Default on `lightning_v3.1_pro`:** when `language` is omitted, the\nPro pool defaults to **`en + hi`** (mixed Indian + Western English\ncoverage, auto-detected from the input text).\n\nEach voice has its own `tags.language` set in the voice catalog —\nquery `GET /waves/v1/lightning-v3.1/get_voices`. Pass a language\nthe voice was trained on; passing other codes is accepted by the\nAPI but produces English-pronounced output.\n\n**`auto` (recommended for cross-language use cases):** routes internally\nbased on the input text. Any English or Hindi voice can be used\nacross all supported languages when `auto` is set; the platform\nhandles language-appropriate routing without needing a code per\ncall.\n\n**On `lightning_v3.1`** — 20 supported languages:\n- 10 European: English, Spanish, French, German, Italian, Dutch, Swedish, Portuguese, Polish, Russian\n- 10 Indic: Hindi, Marathi, Gujarati, Punjabi, Bengali, Odia, Tamil, Telugu, Kannada, Malayalam\n\n**On `lightning_v3.1_pro`** — 31 supported languages (adds 11 over base):\n- 13 European: base 10 plus Greek, Finnish, Norwegian\n- 8 Asian & Middle Eastern: Chinese, Japanese, Korean, Indonesian, Malay, Vietnamese, Turkish, Arabic\n- 10 Indic: same as base\n- Pass `en` → UK + American accented English.\n- Pass `hi` → Indian accented English + Hindi (code-switching).\n- Omit `language` → defaults to `en + hi` (mixed Indian + Western English coverage, auto-detected from input text).\n"},"number_pronunciation_language":{"$ref":"#/components/schemas/TtsRequestNumberPronunciationLanguage","description":"Optional. Sets the language used to read out numeric content —\nnumbers, currency amounts, times, and the numeric parts of dates\nand years — independently of the synthesis voice. Ordinary words\nare not translated.\n\n- If you **omit `language`**, this value also becomes the\n  synthesis language: model selection and voice routing follow it.\n- If you **set `language` explicitly**, `language` always wins for\n  synthesis and `number_pronunciation_language` only changes how\n  numeric content is normalized. It works both ways — read numbers\n  in Hindi under an English voice, or in English under a Hindi\n  voice (tuned for Indian, often mixed-script, use cases).\n- Omit this field to keep the existing behaviour — normalization\n  follows `language`.\n\nNote: only numeric tokens are re-spoken; the words around them\nstay in the text language. On a cross-language request names may\nalso render in the target script (e.g. \"Smith\" → \"स्मिथ\"), which\nis generally the desired reading for native-language voices.\n\nAccepts the same language codes as `language` (including `auto`,\n`nl`, `sv`).\n"},"output_format":{"$ref":"#/components/schemas/TtsRequestOutputFormat","default":"pcm","description":"Format of the returned audio. `pcm` is the lowest-latency option\nbut requires a decoder to play; `mp3` and `wav` are directly\nplayable in browsers and most media players. The server default\nis `pcm` when the field is omitted — the API playground uses\n`mp3` so the generated audio is directly playable.\n"},"pronunciation_dicts":{"type":"array","items":{"type":"string"},"description":"The IDs of the pronunciation dictionaries to use for speech generation. Available on both `lightning_v3.1` and `lightning_v3.1_pro`."},"word_timestamps":{"type":"boolean","default":false,"description":"**WebSocket-only feature.** Accepted on this endpoint but ignored — no per-word timing information is returned in the sync HTTP or SSE response shape. To receive `status: \"word_timestamp\"` frames with per-word `{ id, word, start, end }` data, use the WebSocket endpoint `wss://api.smallest.ai/waves/v1/tts/live`. See [Word-level timestamps](/models/documentation/text-to-speech-lightning/word-timestamps).\n"},"session_id":{"type":"string","description":"Optional client-provided session identifier for correlation. Only alphanumeric characters, hyphens, underscores, and dots are allowed. Max 128 characters. Echoed back in response headers as `X-External-Session-Id`."},"request_id":{"type":"string","description":"Optional client-provided request identifier for correlation. Only alphanumeric characters, hyphens, underscores, and dots are allowed. Max 128 characters. Echoed back in response headers as `X-External-Request-Id`."}},"required":["text","voice_id"],"title":"TtsRequest"},"TtsError":{"type":"object","properties":{"error":{"type":"string","description":"Error type."},"message":{"type":"string","description":"Error message."}},"title":"TtsError"},"WavesV1ModelGetVoicesGetParametersModel":{"type":"string","enum":["lightning-v3.1"],"default":"lightning-v3.1","title":"WavesV1ModelGetVoicesGetParametersModel"},"WavesV1ModelGetVoicesGetResponsesContentApplicationJsonSchemaVoicesItemsTags":{"type":"object","properties":{"language":{"type":"array","items":{"type":"string"},"description":"Languages the voice was trained on (e.g., `[\"english\"]`, `[\"english\", \"hindi\"]`)."},"accent":{"type":"string","description":"Accent of the voice (e.g., `american`, `british`, `indian`)."},"gender":{"type":"string","description":"Gender of the voice (`male` or `female`)."},"age":{"type":"string","description":"Age range of the voice (e.g., `young`, `middle aged`, `senior`)."},"emotions":{"type":"array","items":{"type":"string"},"description":"Emotional ranges the voice supports. May be empty."},"usecases":{"type":"array","items":{"type":"string"},"description":"Recommended use cases for the voice (e.g., `conversational`, `narration`)."}},"description":"Tag metadata used to identify the voice's characteristics. Filter on these fields to find voices for a target language, accent, or use case. Fields may be empty on some voices.","title":"WavesV1ModelGetVoicesGetResponsesContentApplicationJsonSchemaVoicesItemsTags"},"WavesV1ModelGetVoicesGetResponsesContentApplicationJsonSchemaVoicesItems":{"type":"object","properties":{"voiceId":{"type":"string","description":"Unique Voice ID. Pass this value as `voice_id` on `POST /waves/v1/tts` (or the streaming route)."},"displayName":{"type":"string","description":"Display name for the voice."},"tags":{"$ref":"#/components/schemas/WavesV1ModelGetVoicesGetResponsesContentApplicationJsonSchemaVoicesItemsTags","description":"Tag metadata used to identify the voice's characteristics. Filter on these fields to find voices for a target language, accent, or use case. Fields may be empty on some voices."}},"required":["voiceId","displayName"],"title":"WavesV1ModelGetVoicesGetResponsesContentApplicationJsonSchemaVoicesItems"},"Voices_getWavesVoices_Response_200":{"type":"object","properties":{"voices":{"type":"array","items":{"$ref":"#/components/schemas/WavesV1ModelGetVoicesGetResponsesContentApplicationJsonSchemaVoicesItems"},"description":"List of available voices."}},"title":"Voices_getWavesVoices_Response_200"},"GetWavesVoicesRequestBadRequestError":{"type":"object","properties":{"error":{"type":"string","description":"Error type"},"message":{"type":"string","description":"Error message"}},"title":"GetWavesVoicesRequestBadRequestError"},"GetWavesVoicesRequestUnauthorizedError":{"type":"object","properties":{"error":{"type":"string","description":"Error type"},"message":{"type":"string","description":"Error message"}},"title":"GetWavesVoicesRequestUnauthorizedError"},"GetWavesVoicesRequestInternalServerError":{"type":"object","properties":{"error":{"type":"string","description":"Error type"},"message":{"type":"string","description":"Error message"}},"title":"GetWavesVoicesRequestInternalServerError"},"WavesV1VoiceCloningPostRequestBodyContentMultipartFormDataSchemaModel":{"type":"string","enum":["lightning-v3.1"],"default":"lightning-v3.1","description":"Voice cloning model. Defaults to `lightning-v3.1`.\n`lightning-v2` is accepted by the schema for historical\nreasons but is deprecated — the server returns 400 with\n`\"Voice cloning for lightning-v2 is deprecated. Please use lightning-v3.1\"`.\n","title":"WavesV1VoiceCloningPostRequestBodyContentMultipartFormDataSchemaModel"},"WavesV1VoiceCloningPostResponsesContentApplicationJsonSchemaDataStatus":{"type":"string","enum":["pending","processing","completed","failed"],"title":"WavesV1VoiceCloningPostResponsesContentApplicationJsonSchemaDataStatus"},"WavesV1VoiceCloningPostResponsesContentApplicationJsonSchemaDataSamplesItems":{"type":"object","properties":{"text":{"type":"string","description":"Text that was synthesized."},"audioUrl":{"type":"string","description":"Signed URL to the generated sample audio."}},"title":"WavesV1VoiceCloningPostResponsesContentApplicationJsonSchemaDataSamplesItems"},"WavesV1VoiceCloningPostResponsesContentApplicationJsonSchemaData":{"type":"object","properties":{"voiceId":{"type":"string","description":"Unique voice ID. Pass this as `voice_id` in TTS requests."},"displayName":{"type":"string"},"model":{"type":"string","description":"Internal model document for the cloned voice."},"status":{"$ref":"#/components/schemas/WavesV1VoiceCloningPostResponsesContentApplicationJsonSchemaDataStatus"},"language":{"type":"string"},"audioFileNames":{"type":"array","items":{"type":"string"}},"createdAt":{"type":"string","format":"date-time"},"organizationId":{"type":"string"},"samples":{"type":"array","items":{"$ref":"#/components/schemas/WavesV1VoiceCloningPostResponsesContentApplicationJsonSchemaDataSamplesItems"},"description":"Pre-generated sample audio clips in the cloned voice."}},"title":"WavesV1VoiceCloningPostResponsesContentApplicationJsonSchemaData"},"Voice Cloning_createVoiceClone_Response_200":{"type":"object","properties":{"message":{"type":"string"},"data":{"$ref":"#/components/schemas/WavesV1VoiceCloningPostResponsesContentApplicationJsonSchemaData"}},"title":"Voice Cloning_createVoiceClone_Response_200"},"CreateVoiceCloneRequestBadRequestError":{"type":"object","pro