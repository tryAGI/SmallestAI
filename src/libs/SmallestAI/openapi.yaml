{"openapi":"3.1.0","info":{"title":"API Reference","version":"1.0.0"},"paths":{"/waves/v1/tts":{"post":{"operationId":"synthesize-speech","summary":"Synthesize speech","description":"Synthesize speech from text in a single request. Pass `text` + `voice_id`, get back binary audio.\n\nPick the model with the `model` body parameter: default `lightning_v3.1`, or `lightning_v3.1_pro` for the Pro pool. Other request parameters are identical across models.\n\n## When to use this\n\n- **Use this** for short utterances you can render before playback (notifications, prompts, batch jobs, audio file generation).\n- **Use `/waves/v1/tts/live`** when you want playback to start before the full audio is ready (long passages, latency-sensitive apps).\n- **Use `/waves/v1/tts/live`** (WebSocket) when text arrives incrementally (LLM token streams, live captioning).\n\n## Key features\n\n- 44 kHz natural, expressive synthesis\n- Model selectable per request via `model` body parameter\n- Cloned voice IDs (`voice_*`) work on `lightning_v3.1` — same param as catalog voices\n- 12 documented languages on `lightning_v3.1`; English + Hindi on `lightning_v3.1_pro`\n- Output formats: `pcm`, `mp3`, `wav`, `ulaw`, `alaw`\n- Sample rates: 8 kHz – 44.1 kHz\n- Speed: 0.5× – 2×\n- Per-call pronunciation dictionaries via `pronunciation_dicts`\n\n## Examples\n\n**cURL — Lightning v3.1 (default)**\n```bash\ncurl -X POST \"https://api.smallest.ai/waves/v1/tts\" \\\n  -H \"Authorization: Bearer $SMALLEST_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Accept: audio/wav\" \\\n  -d '{\n    \"text\": \"Hello from Waves TTS.\",\n    \"voice_id\": \"magnus\",\n    \"sample_rate\": 24000,\n    \"output_format\": \"wav\"\n  }' --output speech.wav\n```\n\n**cURL — Lightning v3.1 Pro**\n```bash\ncurl -X POST \"https://api.smallest.ai/waves/v1/tts\" \\\n  -H \"Authorization: Bearer $SMALLEST_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Accept: audio/wav\" \\\n  -d '{\n    \"text\": \"Hello from the Lightning v3.1 Pro pool.\",\n    \"voice_id\": \"meher\",\n    \"model\": \"lightning_v3.1_pro\",\n    \"sample_rate\": 24000,\n    \"output_format\": \"wav\"\n  }' --output speech.wav\n```\n\n## Common gotchas\n\n- **Set `Accept: audio/wav`.** Omitting it can return an empty or unplayable response.\n- **Pair voice IDs with the right model.** Voice catalogs differ between `lightning_v3.1` and `lightning_v3.1_pro`. The API does not reject mismatched pairings, but using a Pro-only `voice_id` with `model=lightning_v3.1` (or omitting `model`) can return wrong or hallucinated audio. Pair Pro voices with `model=lightning_v3.1_pro`; standard catalog voices with `model=lightning_v3.1` (the default).\n- **Cloned voices** (`voice_*` from `add_voice`) work with `lightning_v3.1` only; voice cloning is not available on `lightning_v3.1_pro`.\n- **44.1 kHz output** is supported but most playback environments are happy with 24 kHz — drop the sample rate if bandwidth matters.\n","tags":["subpackage_textToSpeech"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}},{"name":"Accept","in":"header","description":"Must be `audio/wav` to receive binary audio. Required for proper playback.","required":true,"schema":{"$ref":"#/components/schemas/WavesV1TtsPostParametersAccept"}}],"responses":{"200":{"description":"Synthesized speech retrieved successfully.","content":{"application/octet-stream":{"schema":{"type":"string","format":"binary"}}}},"400":{"description":"Bad request.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/TtsError"}}}},"401":{"description":"Unauthorized.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/TtsError"}}}},"500":{"description":"Server error occurred.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/TtsError"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/TtsRequest"}}}}}},"/waves/v1/tts/live":{"post":{"operationId":"synthesize-speech-sse","summary":"Stream speech (SSE)","description":"Synthesize speech and stream the audio back over Server-Sent Events. Same body as `/waves/v1/tts` — the only difference is the response is a stream of base64-encoded PCM chunks instead of one binary blob.\n\nPick the model with the `model` body parameter, same as the sync route.\n\n<Note>\n  **The same URL serves the WebSocket endpoint.** `wss://api.smallest.ai/waves/v1/tts/live` accepts a WebSocket upgrade for streaming-text scenarios (LLM token streams, live captioning). The HTTP `POST` documented on this page returns SSE; use `wss://` to use the WebSocket protocol instead. See the [WebSocket reference](/waves/api-reference/api-reference/text-to-speech/tts).\n</Note>\n\n## When to use this\n\n- **Use this** when you want playback to start before synthesis is complete — long passages, latency-sensitive UI, live narration.\n- **Use sync `/waves/v1/tts`** when total latency doesn't matter and you'd rather get one buffer.\n- **Use `/waves/v1/tts/live`** (WebSocket) when the *text* arrives incrementally (LLM token stream). SSE assumes you have the full text up front.\n\n## How it works\n\n1. POST your text + voice settings — same payload as `/waves/v1/tts`, plus optional `model`.\n2. The response is `Content-Type: text/event-stream`. Each chunk frame is `event: audio\\n` followed by `data: {\"audio\": \"<base64-pcm>\"}\\n\\n`.\n3. Decode each chunk's `audio` field with base64 and feed the PCM bytes to your audio pipeline (browser `MediaSource`, ffmpeg pipe, raw PCM player, etc.).\n4. A final `data: {\"done\": true}\\n\\n` frame marks end of stream.\n\n## Examples\n\n**cURL**\n```bash\ncurl -N -X POST \"https://api.smallest.ai/waves/v1/tts/live\" \\\n  -H \"Authorization: Bearer $SMALLEST_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"text\": \"Streaming this paragraph chunk by chunk so playback can start sooner.\",\n    \"voice_id\": \"magnus\",\n    \"sample_rate\": 24000,\n    \"output_format\": \"pcm\"\n  }'\n```\n\n## Common gotchas\n\n- **Use a streaming-friendly client.** `curl -N`, Python `iter_lines`, or a `fetch` `ReadableStream` reader. Buffering clients will hide the latency win.\n- **Audio is base64 inside the event payload**, not the raw event bytes. Decode the `data.audio` field per event.\n- **`output_format=pcm`** gives the lowest overhead for streaming playback. `wav`/`mp3` work but add per-chunk framing bytes.\n","tags":["subpackage_textToSpeech"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Synthesized speech retrieved successfully.","content":{"text/event-stream":{"schema":{"type":"string"}}}},"400":{"description":"Bad request.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/TtsError"}}}},"401":{"description":"Unauthorized.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/TtsError"}}}},"500":{"description":"Server error occurred.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/TtsError"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/TtsRequest"}}}}}},"/waves/v1/lightning-v3.1/get_speech":{"post":{"operationId":"synthesize-lightning-v-31-speech","summary":"Lightning v3.1 (endpoint will be deprecated)","description":"<Warning>**Endpoint scheduled for retirement.** This URL will stop accepting requests **60 days from the Lightning v3.1 Pro launch (2026-05-15)** — i.e. on **2026-07-14**. The Lightning v3.1 model itself is current and stays. Migrate to [`POST /waves/v1/tts`](/waves/api-reference/api-reference/text-to-speech/synthesize-speech) and select Lightning v3.1 via the `model` body field (default).</Warning>\n\nSynthesize speech from text in a single request. The simplest way to get audio when you have the full text up front — pass `text` + `voice_id`, get back binary audio.\n\n## When to use this\n\n- **Use this** for short utterances you can render before playback (notifications, prompts, batch jobs, audio file generation).\n- **Use the SSE streaming endpoint** when you want playback to start before the full audio is ready (long passages, latency-sensitive apps).\n- **Use the WebSocket endpoint** when text arrives incrementally (LLM token streams, live captioning).\n\n## Key features\n\n- 44 kHz natural, expressive synthesis\n- Cloned voice IDs (`voice_*`) work — same param as catalog voices\n- 12 documented languages — see the model card for the full list\n- Output formats: `pcm`, `mp3`, `wav`, `ulaw`, `alaw`\n- Sample rates: 8 kHz – 44.1 kHz\n- Speed: 0.5× – 2×\n- Per-call pronunciation dictionaries via `pronunciation_dicts`\n\n## Examples\n\n**cURL**\n```bash\ncurl -X POST \"https://api.smallest.ai/waves/v1/lightning-v3.1/get_speech\" \\\n  -H \"Authorization: Bearer $SMALLEST_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Accept: audio/wav\" \\\n  -d '{\n    \"text\": \"Hello from Lightning v3.1.\",\n    \"voice_id\": \"magnus\",\n    \"sample_rate\": 24000,\n    \"output_format\": \"wav\"\n  }' --output speech.wav\n```\n\n**Python** (`pip install smallestai>=4.4.0`)\n```python\nfrom smallestai import SmallestAI\n\nclient = SmallestAI(token=\"YOUR_API_KEY\")\n\nwith open(\"speech.wav\", \"wb\") as f:\n    for chunk in client.waves.synthesize_lightning_v3_1(\n        text=\"Hello from Lightning v3.1.\",\n        voice_id=\"magnus\",\n        sample_rate=24000,\n        output_format=\"wav\",\n        # Optional: cloned voice support\n        # voice_id=\"voice_FlPKRWI7DX\",\n        # Optional: pin pronunciations for specific words\n        # pronunciation_dicts=[\"<your dict id>\"],\n    ):\n        f.write(chunk)\n```\n\n**JavaScript / TypeScript** (using `fetch`)\n```typescript\nconst res = await fetch(\"https://api.smallest.ai/waves/v1/lightning-v3.1/get_speech\", {\n  method: \"POST\",\n  headers: {\n    Authorization: `Bearer ${process.env.SMALLEST_API_KEY}`,\n    \"Content-Type\": \"application/json\",\n    Accept: \"audio/wav\",\n  },\n  body: JSON.stringify({\n    text: \"Hello from Lightning v3.1.\",\n    voice_id: \"magnus\",\n    sample_rate: 24000,\n    output_format: \"wav\",\n  }),\n});\nconst audio = Buffer.from(await res.arrayBuffer());\nrequire(\"node:fs\").writeFileSync(\"speech.wav\", audio);\n```\n\n## Common gotchas\n\n- **Set `Accept: audio/wav`.** Omitting it can return an empty or unplayable response.\n- **Cloned voices** (`voice_*` from `add_voice`) work on this endpoint and support `pronunciation_dicts`.\n- **`pronunciation_dicts` validates IDs at request time.** Passing an unknown ID returns `Invalid input data` — create the dict first via the pronunciation-dicts endpoint and save the returned `id`.\n- **Pronunciation matching is case-sensitive.** Add both `Synopsis` and `synopsis` if your text uses both casings.\n- **44.1 kHz output** is supported but most playback environments are happy with 24 kHz — drop the sample rate if bandwidth matters.\n- **JavaScript / TypeScript**: the official `smallestai` npm package predates Lightning v3.1, so call this endpoint with `fetch` or `axios` as shown above.\n","tags":["subpackage_textToSpeech"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}},{"name":"Accept","in":"header","description":"Must be `audio/wav` to receive binary audio. Required for proper playback.","required":true,"schema":{"$ref":"#/components/schemas/WavesV1LightningV31GetSpeechPostParametersAccept"}}],"responses":{"200":{"description":"Synthesized speech retrieved successfully.","content":{"application/octet-stream":{"schema":{"type":"string","format":"binary"}}}},"400":{"description":"Bad request.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/SynthesizeLightningV31SpeechRequestBadRequestError"}}}},"401":{"description":"Unauthorized.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/SynthesizeLightningV31SpeechRequestUnauthorizedError"}}}},"500":{"description":"Server error occurred.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/SynthesizeLightningV31SpeechRequestInternalServerError"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/LightningV31Request"}}}}}},"/waves/v1/lightning-v3.1/stream":{"post":{"operationId":"stream-lightning-v-31-speech","summary":"Lightning v3.1 SSE (endpoint will be deprecated)","description":"<Warning>**Endpoint scheduled for retirement.** This URL will stop accepting requests **60 days from the Lightning v3.1 Pro launch (2026-05-15)** — i.e. on **2026-07-14**. The Lightning v3.1 model itself is current and stays. Migrate to [`POST /waves/v1/tts/live`](/waves/api-reference/api-reference/text-to-speech/synthesize-speech-sse) and select Lightning v3.1 via the `model` body field (default).</Warning>\n\nSynthesize speech and stream the audio back over Server-Sent Events. The body and parameters are identical to the sync `/get_speech` endpoint — the difference is the response is a stream of base64-encoded PCM chunks instead of one binary blob.\n\n## When to use this\n\n- **Use this** when you want playback to start before synthesis is complete — long passages, latency-sensitive UI, live narration.\n- **Use sync `/get_speech`** when total latency doesn't matter and you'd rather get one buffer.\n- **Use the WebSocket endpoint** when the *text* arrives incrementally (LLM token stream). SSE assumes you have the full text up front.\n\n## How it works\n\n1. POST your text + voice settings — same payload as `/get_speech`.\n2. The response is `Content-Type: text/event-stream`. Each chunk frame is `event: audio\\n` followed by `data: {\"audio\": \"<base64-pcm>\"}\\n\\n`.\n3. Decode each chunk's `audio` field with base64 and feed the PCM bytes to your audio pipeline (browser `MediaSource`, ffmpeg pipe, raw PCM player, etc.).\n4. A final `data: {\"done\": true}\\n\\n` frame marks end of stream.\n\n## Examples\n\n**cURL**\n```bash\ncurl -N -X POST \"https://api.smallest.ai/waves/v1/lightning-v3.1/stream\" \\\n  -H \"Authorization: Bearer $SMALLEST_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"text\": \"Streaming this paragraph chunk by chunk so playback can start sooner.\",\n    \"voice_id\": \"magnus\",\n    \"sample_rate\": 24000,\n    \"output_format\": \"pcm\"\n  }'\n```\n\n**Python** (`pip install smallestai>=4.4.0`)\n```python\nimport base64\nfrom smallestai import SmallestAI\n\nclient = SmallestAI(token=\"YOUR_API_KEY\")\n\nwith open(\"stream.pcm\", \"wb\") as f:\n    for chunk in client.waves.synthesize_sse_lightning_v3_1(\n        text=\"Streaming this paragraph chunk by chunk so playback can start sooner.\",\n        voice_id=\"magnus\",\n        sample_rate=24000,\n        output_format=\"pcm\",\n    ):\n        # Each chunk is `{\"audio\": \"<base64-encoded PCM>\"}`.\n        # Decode and pipe to your audio pipeline.\n        if chunk.get(\"audio\"):\n            f.write(base64.b64decode(chunk[\"audio\"]))\n```\n\n**JavaScript / TypeScript** (using `fetch` + a reader)\n```typescript\nconst res = await fetch(\"https://api.smallest.ai/waves/v1/lightning-v3.1/stream\", {\n  method: \"POST\",\n  headers: {\n    Authorization: `Bearer ${process.env.SMALLEST_API_KEY}`,\n    \"Content-Type\": \"application/json\",\n  },\n  body: JSON.stringify({\n    text: \"Streaming this paragraph chunk by chunk so playback can start sooner.\",\n    voice_id: \"magnus\",\n    sample_rate: 24000,\n    output_format: \"pcm\",\n  }),\n});\n\nconst reader = res.body!.getReader();\nconst decoder = new TextDecoder();\nlet buf = \"\";\nlet finished = false;\nwhile (!finished) {\n  const { value, done } = await reader.read();\n  if (done) break;\n  buf += decoder.decode(value);\n  const events = buf.split(\"\\n\\n\");\n  buf = events.pop() ?? \"\";\n  for (const ev of events) {\n    // SSE frames are \"event: audio\\ndata: {json}\" or just \"data: {json}\".\n    // We only care about the data line — pull it out and parse.\n    const dataLine = ev.split(\"\\n\").find((l) => l.startsWith(\"data:\"));\n    if (!dataLine) continue;\n    const payload = JSON.parse(dataLine.slice(5).trim());\n    if (payload.done) { finished = true; break; }\n    if (payload.audio) {\n      const pcm = Buffer.from(payload.audio, \"base64\");\n      // … hand pcm to your audio pipeline\n    }\n  }\n}\n```\n\n## Common gotchas\n\n- **Use a streaming-friendly client.** `curl -N`, Python `iter_lines`, or a `fetch` `ReadableStream` reader. Buffering clients will hide the latency win.\n- **Audio is base64 inside the event payload**, not the raw event bytes. Decode the `data.audio` field per event.\n- **`output_format=pcm`** gives the lowest overhead for streaming playback. `wav`/`mp3` work but add per-chunk framing bytes.\n- **First-chunk latency** depends on model warm-up + network distance. Use `output_format=pcm` and a streaming-friendly client to minimize what you can control.\n- **JavaScript / TypeScript**: the official `smallestai` npm package predates Lightning v3.1, so call this endpoint with `fetch` as shown above.\n","tags":["subpackage_textToSpeech"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Synthesized speech retrieved successfully.","content":{"application/json":{"schema":{"type":"object","properties":{}}}}},"400":{"description":"Bad request.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/StreamLightningV31SpeechRequestBadRequestError"}}}},"401":{"description":"Unauthorized.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/StreamLightningV31SpeechRequestUnauthorizedError"}}}},"500":{"description":"Server error occurred.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/StreamLightningV31SpeechRequestInternalServerError"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/LightningV31Request"}}}}}},"/waves/v1/lightning-v2/get_speech":{"post":{"operationId":"synthesize-lightningv-2-speech","summary":"Lightning v2","description":"Get speech for given text using the Waves API","tags":["subpackage_textToSpeech"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Synthesized speech retrieved successfully.","content":{"application/octet-stream":{"schema":{"type":"string","format":"binary"}}}},"400":{"description":"Bad request.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/SynthesizeLightningv2SpeechRequestBadRequestError"}}}},"401":{"description":"Unauthorized.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/SynthesizeLightningv2SpeechRequestUnauthorizedError"}}}},"500":{"description":"Server error occurred.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/SynthesizeLightningv2SpeechRequestInternalServerError"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/Lightningv2Request"}}}}}},"/waves/v1/lightning-v2/stream":{"post":{"operationId":"stream-lightningv-2-speech","summary":"Lightning v2 SSE","description":"The Lightning v2 SSE API provides real-time text-to-speech streaming capabilities with high-quality voice synthesis. This API uses Server-Sent Events (SSE) to deliver audio chunks as they're generated, enabling low-latency audio playback without waiting for the entire audio file to process.\nFor an end-to-end example of how to use the Lightning v2 SSE API, check out [Text to Speech (SSE) Example](https://github.com/smallest-inc/waves-examples/blob/main/lightning_v2/http_streaming/http_streaming_api.py)\n\n## When to Use\n\n- **Interactive Applications**: Perfect for chatbots, virtual assistants, and other applications requiring immediate voice responses\n- **Long-Form Content**: Efficiently stream audio for articles, stories, or other long-form content without buffering delays\n- **Voice User Interfaces**: Create natural-sounding voice interfaces with minimal perceived latency\n- **Accessibility Solutions**: Provide real-time audio versions of written content for users with visual impairments\n\n## How It Works\n\n1. **Make a POST Request**: Send your text and voice settings to the API endpoint\n2. **Receive Audio Chunks**: The API processes your text and streams audio back as base64-encoded chunks with 1024 byte size\n3. **Process the Stream**: Handle the SSE events to decode and play audio chunks sequentially\n4. **End of Stream**: The API sends a completion event when all audio has been delivered\n","tags":["subpackage_textToSpeech"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Synthesized speech retrieved successfully.","content":{"application/json":{"schema":{"type":"object","properties":{}}}}},"400":{"description":"Bad request.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/StreamLightningv2SpeechRequestBadRequestError"}}}},"401":{"description":"Unauthorized.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/StreamLightningv2SpeechRequestUnauthorizedError"}}}},"500":{"description":"Server error occurred.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/StreamLightningv2SpeechRequestInternalServerError"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/Lightningv2Request"}}}}}},"/waves/v1/{model}/get_voices":{"get":{"operationId":"get-waves-voices","summary":"Get Voices","description":"List voices available for Lightning v3.1. The response is the union of the standard and Pro voice catalogs — the API does not return a per-voice \"is Pro\" flag, so consult the [Lightning v3.1 Pro](/waves/model-cards/text-to-speech/lightning-v-3-1-pro) and [Lightning v3.1](/waves/model-cards/text-to-speech/lightning-v-3-1) model cards for the canonical per-pool voice lists. Use the `voice_id` from this response together with `\"model\": \"lightning_v3.1\"` (default) or `\"model\": \"lightning_v3.1_pro\"` on the unified `/waves/v1/tts` route to pick the pool.\n","tags":["subpackage_voices"],"parameters":[{"name":"model","in":"path","description":"The catalog to query. Currently only `lightning-v3.1` is supported — the response returns the union of standard Lightning v3.1 voices and Lightning v3.1 Pro voices. The API does not include a per-voice Pro flag; consult the model cards for the canonical per-pool catalogs.\n","required":true,"schema":{"$ref":"#/components/schemas/WavesV1ModelGetVoicesGetParametersModel"}},{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Voices retrieved successfully.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Voices_getWavesVoices_Response_200"}}}},"400":{"description":"Bad request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/GetWavesVoicesRequestBadRequestError"}}}},"401":{"description":"Unauthorized","content":{"application/json":{"schema":{"$ref":"#/components/schemas/GetWavesVoicesRequestUnauthorizedError"}}}},"500":{"description":"Server error occurred","content":{"application/json":{"schema":{"$ref":"#/components/schemas/GetWavesVoicesRequestInternalServerError"}}}}}}},"/waves/v1/voice-cloning":{"post":{"operationId":"create-voice-clone","summary":"Create a Voice Clone","description":"Create an instant voice clone in a single call. Defaults to `lightning-v3.1`.\n","tags":["subpackage_voiceCloning"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Voice clone created. Includes pre-generated sample clips of the new voice.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Voice Cloning_createVoiceClone_Response_200"}}}},"400":{"description":"Validation error. Common causes: no file provided, invalid MIME type,\nfile too large, clone limit exceeded, invalid language, or\n`model=lightning-v2` (deprecated).\n","content":{"application/json":{"schema":{"$ref":"#/components/schemas/CreateVoiceCloneRequestBadRequestError"}}}},"401":{"description":"Unauthorized — missing or invalid API key.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/CreateVoiceCloneRequestUnauthorizedError"}}}},"500":{"description":"Server error. The `error_code` field may be populated for known failure modes.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/CreateVoiceCloneRequestInternalServerError"}}}}},"requestBody":{"content":{"multipart/form-data":{"schema":{"type":"object","properties":{"displayName":{"type":"string","description":"Human-readable name for the voice clone."},"file":{"type":"string","format":"binary","description":"Audio file to clone from. Supported MIME types:\n`audio/mpeg`, `audio/mpeg-3`, `audio/wav`, `audio/wave`,\n`audio/webm`, `video/webm`, `audio/mp4`, `video/mp4`.\nMaximum size: 5 MB.\n"},"description":{"type":"string","description":"Optional longer description for the voice clone."},"accent":{"type":"string","description":"Optional accent tag (e.g. \"general\", \"indian\")."},"tags":{"type":"string","description":"Optional comma-separated list of tags. Server splits on\ncommas and trims whitespace (`\"en, tone-test\"` → `[\"en\", \"tone-test\"]`).\n"},"language":{"type":"string","description":"Primary language the clone will be used for. Optional, but\n**strongly recommended** — set it to the language of your\nreference audio. When a TTS request later uses\n`language: \"auto\"`, the server falls back to this value, so\nsetting it now avoids silent language mismatches at inference\ntime.\n\nMust be one of the languages supported by `lightning-v3.1`\n(e.g. `en`, `hi`, `multi`). The server validates and rejects\nunsupported codes with a 400.\n"},"model":{"$ref":"#/components/schemas/WavesV1VoiceCloningPostRequestBodyContentMultipartFormDataSchemaModel","default":"lightning-v3.1","description":"Voice cloning model. Defaults to `lightning-v3.1`.\n`lightning-v2` is accepted by the schema for historical\nreasons but is deprecated — the server returns 400 with\n`\"Voice cloning for lightning-v2 is deprecated. Please use lightning-v3.1\"`.\n"}},"required":["displayName","file"]}}}}},"get":{"operationId":"list-voice-clones","summary":"List Voice Clones","description":"Retrieve all voice clones in your organization.\n","tags":["subpackage_voiceCloning"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"List of voice clones.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Voice Cloning_listVoiceClones_Response_200"}}}},"401":{"description":"Unauthorized.","content":{"application/json":{"schema":{"description":"Any type"}}}},"500":{"description":"Server error.","content":{"application/json":{"schema":{"description":"Any type"}}}}}}},"/waves/v1/lightning-large":{"delete":{"operationId":"delete-voice-clone","summary":"Delete a Voice Clone","description":"Delete a voice clone by `voiceId`. Despite the `/lightning-large/`\npath, this endpoint deletes any voice clone on the organization,\nincluding clones created via `POST /waves/v1/voice-cloning`.\n","tags":["subpackage_voiceCloning"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Voice clone deleted successfully","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Voice Cloning_deleteVoiceClone_Response_200"}}}},"400":{"description":"Bad request (Invalid voice ID or validation error)","content":{"application/json":{"schema":{"$ref":"#/components/schemas/DeleteVoiceCloneRequestBadRequestError"}}}},"401":{"description":"Unauthorized","content":{"application/json":{"schema":{"$ref":"#/components/schemas/DeleteVoiceCloneRequestUnauthorizedError"}}}},"500":{"description":"Server error occurred","content":{"application/json":{"schema":{"$ref":"#/components/schemas/DeleteVoiceCloneRequestInternalServerError"}}}}},"requestBody":{"content":{"application/json":{"schema":{"type":"object","properties":{"voiceId":{"type":"string","description":"The unique identifier of the voice clone to delete."}},"required":["voiceId"]}}}}}},"/waves/v1/lightning-large/add_voice":{"post":{"operationId":"add-voice-to-model","summary":"Add your Voice (Deprecated)","description":"**Deprecated** — use `POST /waves/v1/voice-cloning` instead. The new\nendpoint defaults to `lightning-v3.1`, supports optional metadata,\nand returns pre-generated sample clips. This endpoint only clones\nonto `lightning-large` and the resulting voices do not work on\n`lightning-v3.1` (returns an empty WAV). Kept live for backward\ncompatibility; new integrations should migrate.\n","tags":["subpackage_voiceCloning"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Voice clone created successfully","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Voice Cloning_addVoiceToModel_Response_200"}}}},"400":{"description":"Bad request or limit exceeded","content":{"application/json":{"schema":{"$ref":"#/components/schemas/AddVoiceToModelRequestBadRequestError"}}}},"401":{"description":"Unauthorized","content":{"application/json":{"schema":{"$ref":"#/components/schemas/AddVoiceToModelRequestUnauthorizedError"}}}},"500":{"description":"Server error occurred","content":{"application/json":{"schema":{"$ref":"#/components/schemas/AddVoiceToModelRequestInternalServerError"}}}}},"requestBody":{"content":{"multipart/form-data":{"schema":{"type":"object","properties":{"displayName":{"type":"string","description":"Display name for the voice clone."},"file":{"type":"string","format":"binary","description":"Audio file to create voice clone from."}},"required":["displayName","file"]}}}}}},"/waves/v1/lightning-large/get_cloned_voices":{"get":{"operationId":"get-cloned-voices","summary":"Get your cloned Voices (Deprecated)","description":"**Deprecated** — use `GET /waves/v1/voice-cloning` instead. The new\nlist endpoint returns the same data plus a `modelIds` array per\nclone. Kept live for backward compatibility.\n","tags":["subpackage_voiceCloning"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Voices retrieved successfully.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Voice Cloning_getClonedVoices_Response_200"}}}},"400":{"description":"Bad request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/GetClonedVoicesRequestBadRequestError"}}}},"401":{"description":"Unauthorized","content":{"application/json":{"schema":{"$ref":"#/components/schemas/GetClonedVoicesRequestUnauthorizedError"}}}},"500":{"description":"Server error occurred","content":{"application/json":{"schema":{"$ref":"#/components/schemas/GetClonedVoicesRequestInternalServerError"}}}}}}},"/waves/v1/pronunciation-dicts":{"get":{"operationId":"get-pronunciation-dicts","summary":"List","description":"Retrieve all pronunciation dictionaries for the authenticated user","tags":["subpackage_pronunciationDictionaries"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"List of pronunciation dictionaries","content":{"application/json":{"schema":{"type":"array","items":{"$ref":"#/components/schemas/PronunciationDict"}}}}},"401":{"description":"Unauthorized - Invalid or missing authentication","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"500":{"description":"Internal server error","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}}}},"post":{"operationId":"create-pronunciation-dict","summary":"Create","description":"Create a new pronunciation dictionary for the authenticated user","tags":["subpackage_pronunciationDictionaries"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Successfully created pronunciation dictionary","content":{"application/json":{"schema":{"$ref":"#/components/schemas/PronunciationDict"}}}},"400":{"description":"Bad request - Invalid request body","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"401":{"description":"Unauthorized - Invalid or missing authentication","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"500":{"description":"Internal server error","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/CreatePronunciationDictRequest"}}}}},"put":{"operationId":"update-pronunciation-dict","summary":"Update","description":"Update an existing pronunciation dictionary for the authenticated user","tags":["subpackage_pronunciationDictionaries"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Successfully updated pronunciation dictionary","content":{"application/json":{"schema":{"$ref":"#/components/schemas/UpdatePronunciationDictResponse"}}}},"400":{"description":"Bad request - Invalid request body","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"401":{"description":"Unauthorized - Invalid or missing authentication","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"500":{"description":"Internal server error","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/UpdatePronunciationDictRequest"}}}}},"delete":{"operationId":"delete-pronunciation-dict","summary":"Delete","description":"Delete an existing pronunciation dictionary for the authenticated user","tags":["subpackage_pronunciationDictionaries"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Successfully deleted pronunciation dictionary","content":{"application/json":{"schema":{"$ref":"#/components/schemas/DeletePronunciationDictResponse"}}}},"400":{"description":"Bad request - Invalid request body","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"401":{"description":"Unauthorized - Invalid or missing authentication","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"500":{"description":"Internal server error","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/DeletePronunciationDictRequest"}}}}}},"/waves/v1/stt/":{"post":{"operationId":"transcribe","summary":"Transcribe (Pre-recorded)","description":"Transcribe an audio file. The model is chosen via `?model=`:\n\n- `?model=pulse-pro`: English-only, leaderboard-ranked accuracy. Raw bytes only; pass `webhook_url` to receive transcription asynchronously on long files.\n- `?model=pulse`: multilingual transcription (38 languages), supports both raw bytes and audio-by-URL.\n\n## When to use this\n\nUse this endpoint when you have a complete audio file (call recording, voicemail, podcast episode) and want the transcript back in one response. For live transcription as audio arrives, use the realtime WebSocket endpoint (`WS /waves/v1/stt/live`) instead.\n\nPulse Pro has no streaming worker today; calls to `WS /waves/v1/stt/live?model=pulse-pro` return `400` before the WebSocket upgrades.\n\n## Input methods\n\n- **Raw bytes**: `Content-Type: application/octet-stream` with the audio in the body. All knobs are query parameters.\n- **URL (`?model=pulse` only)**: `Content-Type: application/json` with `{\"url\": \"...\"}` in the body.\n\n## Examples\n\n**cURL**: Pulse Pro, sync\n```bash\ncurl -X POST \"https://api.smallest.ai/waves/v1/stt/?model=pulse-pro&language=en&word_timestamps=true\" \\\n  -H \"Authorization: Bearer $SMALLEST_API_KEY\" \\\n  -H \"Content-Type: application/octet-stream\" \\\n  --data-binary \"@./call.wav\"\n```\n\n**cURL**: Pulse Pro, async via webhook\n```bash\ncurl -X POST \"https://api.smallest.ai/waves/v1/stt/?model=pulse-pro&language=en&webhook_url=https://your.app/cb\" \\\n  -H \"Authorization: Bearer $SMALLEST_API_KEY\" \\\n  -H \"Content-Type: application/octet-stream\" \\\n  --data-binary \"@./call.wav\"\n```\nReturns `200 { \"status\": \"processing\", \"request_id\": \"...\" }` immediately. The webhook receives the full transcription when ready.\n\n**cURL**: Pulse, audio-by-URL\n```bash\ncurl -X POST \"https://api.smallest.ai/waves/v1/stt/?model=pulse&language=en\" \\\n  -H \"Authorization: Bearer $SMALLEST_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"url\": \"https://your-bucket.s3.amazonaws.com/call.wav\"}'\n```\n\n**Python**\n```python\nimport requests\n\nwith open(\"./call.wav\", \"rb\") as f:\n    audio = f.read()\n\nr = requests.post(\n    \"https://api.smallest.ai/waves/v1/stt/\",\n    params={\"model\": \"pulse-pro\", \"language\": \"en\", \"word_timestamps\": \"true\"},\n    headers={\"Authorization\": f\"Bearer {API_KEY}\", \"Content-Type\": \"application/octet-stream\"},\n    data=audio,\n)\nr.raise_for_status()\nprint(r.json()[\"transcription\"])\n```\n\n**JavaScript / TypeScript**\n```typescript\nimport { readFileSync } from \"node:fs\";\n\nconst audio = readFileSync(\"./call.wav\");\nconst params = new URLSearchParams({ model: \"pulse-pro\", language: \"en\", word_timestamps: \"true\" });\n\nconst res = await fetch(`https://api.smallest.ai/waves/v1/stt/?${params}`, {\n  method: \"POST\",\n  headers: { Authorization: `Bearer ${process.env.SMALLEST_API_KEY}`, \"Content-Type\": \"application/octet-stream\" },\n  body: audio,\n});\nconsole.log((await res.json()).transcription);\n```\n\n## Common gotchas\n\n- **`model` is required.** Missing or invalid values return `400` with an enum-validation error.\n- **Pulse Pro is English only.** Pass `language=en`. Other language codes are accepted at the wire level but produce unpredictable output.\n- **Pulse Pro does not support audio-by-URL.** Send raw bytes or use `?model=pulse` for the URL flow.\n- **Async (webhook) mode is Pulse Pro only.** Pulse runs sync only on this endpoint.\n- **Max payload 250 MB.** Larger requests return `413`. Compress to mono 16 kHz PCM if you are close to the limit; quality is unaffected.\n","tags":["subpackage_speechToText"],"parameters":[{"name":"model","in":"query","description":"Selects which ASR model handles the request. Required; missing or invalid values return `400`.\n\n- `pulse-pro`: English only, leaderboard-ranked accuracy, raw bytes only; supports async via `webhook_url`.\n- `pulse`: multilingual (38 languages), raw bytes OR URL.\n","required":true,"schema":{"$ref":"#/components/schemas/WavesV1SttPostParametersModel"}},{"name":"language","in":"query","description":"Language of the audio file. For Pulse Pro pass `en`. For Pulse, see the Pulse model card for the full 38-language list, plus the `multi`, `multi-eu`, `multi-indic`, and `multi-asian` aggregators.\n","required":true,"schema":{"type":"string"}},{"name":"word_timestamps","in":"query","description":"Include per-word timestamps in the response. On Pulse Pro this costs roughly one-third of throughput.","required":false,"schema":{"type":"boolean","default":false}},{"name":"diarize","in":"query","description":"Multi-speaker identification; adds per-word and per-utterance speaker labels.","required":false,"schema":{"type":"boolean","default":false}},{"name":"webhook_url","in":"query","description":"Pulse Pro only. If set, the response is `200` with `{\"status\": \"processing\", \"request_id\": \"...\"}` immediately, and the full transcription is delivered to this URL when ready. Use for long files where you do not want to hold an HTTP connection open.\n","required":false,"schema":{"type":"string","format":"uri"}},{"name":"webhook_method","in":"query","description":"HTTP method to use when calling the webhook. Pulse Pro only.","required":false,"schema":{"$ref":"#/components/schemas/WavesV1SttPostParametersWebhookMethod","default":"POST"}},{"name":"webhook_extra","in":"query","description":"Arbitrary metadata returned to the webhook in addition to the transcription payload. Pulse Pro only.","required":false,"schema":{"type":"string"}},{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Transcription succeeded. The response body has two shapes:\n\n- **Sync**: full `TranscriptionResponse` with `transcription`, `words`, `metadata`, etc. Returned when `webhook_url` is not set (all `?model=pulse` requests, and `?model=pulse-pro` requests without a webhook).\n- **Async**: `{ \"status\": \"processing\", \"request_id\": \"...\" }`. Returned when `?model=pulse-pro` is paired with `webhook_url`. The full `TranscriptionResponse` then arrives on the webhook when ready.\n","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Speech to Text_transcribe_Response_200"}}}},"400":{"description":"Missing or invalid `model` query parameter, invalid params, or unsupported feature combination (e.g. `?model=pulse-pro` on the WS endpoint, audio-by-URL with `?model=pulse-pro`).","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"401":{"description":"API key missing or invalid.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"403":{"description":"Plan does not include access to the requested model.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"413":{"description":"Payload exceeds 250 MB.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"429":{"description":"RPM cap exceeded (Standard plan default 25/min per model).","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}},"503":{"description":"Worker temporarily unavailable.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ErrorResponse"}}}}},"requestBody":{"content":{"application/octet-stream":{"schema":{"type":"string","format":"binary"}}}}}},"/waves/v1/chat/completions":{"post":{"operationId":"electron-chat-completions","summary":"Chat Completions (Electron)","description":"Generate a chat completion with Electron. OpenAI-compatible\nrequest/response shape — point any OpenAI SDK at\n`https://api.smallest.ai/waves/v1` and it just works.\n\nSet `stream: true` to receive tokens via Server-Sent Events. With\n`stream_options: { include_usage: true }`, the final SSE chunk\ncarries the `usage` block so token accounting is exact even on\nclient disconnects.\n\nTool calling follows OpenAI's `tools` array convention. When you\nprovide a voice-agent-style system prompt, Electron emits a short\nfiller phrase in the assistant message `content` field alongside\n`tool_calls` — see the [Tool Calling guide](/waves/documentation/llm-electron/tool-function-calling)\nfor the voice-agent pattern.\n\n## Examples\n\n**cURL**\n```bash\ncurl -X POST \"https://api.smallest.ai/waves/v1/chat/completions\" \\\n  -H \"Authorization: Bearer $SMALLEST_API_KEY\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\n    \"model\": \"electron\",\n    \"messages\": [\n      {\"role\": \"user\", \"content\": \"Write one sentence about why the sky is blue.\"}\n    ]\n  }'\n```\n\n**Python** (`pip install openai`)\n```python\nimport os\nfrom openai import OpenAI\n\nclient = OpenAI(\n    base_url=\"https://api.smallest.ai/waves/v1\",\n    api_key=os.environ[\"SMALLEST_API_KEY\"],\n)\n\nresponse = client.chat.completions.create(\n    model=\"electron\",\n    messages=[\n        {\"role\": \"user\", \"content\": \"Write one sentence about why the sky is blue.\"}\n    ],\n)\n\nprint(response.choices[0].message.content)\n```\n\n**JavaScript / TypeScript** (`npm install openai`)\n```typescript\nimport OpenAI from \"openai\";\n\nconst client = new OpenAI({\n  baseURL: \"https://api.smallest.ai/waves/v1\",\n  apiKey: process.env.SMALLEST_API_KEY,\n});\n\nconst response = await client.chat.completions.create({\n  model: \"electron\",\n  messages: [\n    { role: \"user\", content: \"Write one sentence about why the sky is blue.\" },\n  ],\n});\n\nconsole.log(response.choices[0].message.content);\n```\n\n**Streaming with usage** (Python)\n```python\nstream = client.chat.completions.create(\n    model=\"electron\",\n    messages=[{\"role\": \"user\", \"content\": \"Tell me a one-sentence fun fact.\"}],\n    stream=True,\n    stream_options={\"include_usage\": True},\n)\nfor chunk in stream:\n    if chunk.choices and chunk.choices[0].delta.content:\n        print(chunk.choices[0].delta.content, end=\"\", flush=True)\n    if chunk.usage:\n        print(f\"\\n\\nTokens: {chunk.usage.total_tokens}\")\n```\n\n## Common gotchas\n\n- **Base URL is `/waves/v1`**, not `/v1`. The OpenAI SDK appends `/chat/completions` for you.\n- **`stream_options.include_usage: true`** is required for exact token accounting on streaming calls — the final SSE chunk carries the `usage` block.\n- **`n > 1` and `prompt_logprobs` are rejected.** Use multiple requests if you need parallel completions.\n- **Auth header is `Authorization: Bearer $SMALLEST_API_KEY`** — get the key from the [Smallest AI Console](https://app.smallest.ai/dashboard/api-keys).\n","tags":["subpackage_llm"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Non-streaming: standard OpenAI `chat.completion` object.\n\nStreaming (`stream: true`): `text/event-stream` SSE — each\nevent is a `chat.completion.chunk` delta, terminated by\n`data: [DONE]`.\n","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ChatCompletion"}}}},"400":{"description":"Bad request — schema validation, unsupported parameter\n(`n > 1`, `prompt_logprobs`), context length exceeded, or\ninvalid field value forwarded by the model.\n","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"401":{"description":"Missing or invalid API key.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"403":{"description":"API key valid but no access to Electron on this plan.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"429":{"description":"Rate limit (RPM) or concurrency cap hit. See\n[Concurrency and Limits](/waves/api-reference/api-references/concurrency-and-limits).\n","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"502":{"description":"Upstream model unavailable. Retry with backoff.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"503":{"description":"Endpoint temporarily disabled, or upstream model overloaded.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}}},"requestBody":{"content":{"application/json":{"schema":{"$ref":"#/components/schemas/ChatCompletionRequest"}}}}}}},"servers":[{"url":"https://api.smallest.ai"}],"components":{"schemas":{"WavesV1TtsPostParametersAccept":{"type":"string","enum":["audio/wav"],"default":"audio/wav","title":"WavesV1TtsPostParametersAccept"},"TtsRequestModel":{"type":"string","enum":["lightning_v3.1","lightning_v3.1_pro"],"default":"lightning_v3.1","description":"TTS model to route the request to. Controls which model pool serves\nthis synthesis.\n\n- `lightning_v3.1` (default) — standard Lightning v3.1.\n- `lightning_v3.1_pro` — Lightning v3.1 Pro pool. Improved audio\n  quality and naturalness, with a curated voice catalog. See the\n  [Lightning v3.1 Pro model card](/waves/model-cards/text-to-speech/lightning-v-3-1-pro)\n  for supported voice IDs.\n\nSame concurrency and latency profile across both. Other request\nparameters behave identically.\n","title":"TtsRequestModel"},"TtsRequestSampleRate":{"type":"string","enum":["8000","16000","24000","44100"],"description":"The sample rate for the generated audio.","title":"TtsRequestSampleRate"},"TtsRequestLanguage":{"type":"string","enum":["auto","en","hi","mr","kn","ta","bn","gu","te","ml","pa","or","es"],"default":"en","description":"Language code for synthesis. Influences pronunciation, number/date\nnormalization, and phoneme selection.\n\nEach voice has its own `tags.language` set in the voice catalog —\nquery `GET /waves/v1/lightning-v3.1/get_voices`. Pass a language\nthe voice was trained on; passing other codes is accepted by the\nAPI but produces English-pronounced output.\n\nOn `lightning_v3.1`, the full 12-language catalog applies. On\n`lightning_v3.1_pro`, Indian voices speak `en` and `hi` (with\n`auto` for code-switching); British and American voices speak\nEnglish only.\n","title":"TtsRequestLanguage"},"TtsRequestOutputFormat":{"type":"string","enum":["mp3","pcm","wav","ulaw","alaw"],"default":"pcm","description":"Format of the returned audio. `pcm` is the lowest-latency option\nbut requires a decoder to play; `mp3` and `wav` are directly\nplayable in browsers and most media players. The server default\nis `pcm` when the field is omitted — the API playground uses\n`mp3` so the generated audio is directly playable.\n","title":"TtsRequestOutputFormat"},"TtsRequest":{"type":"object","properties":{"text":{"type":"string","default":"Hello from Waves TTS.","description":"The text to convert to speech."},"voice_id":{"type":"string","default":"magnus","description":"The voice identifier to use for speech generation. See the model card for available voices per model."},"model":{"$ref":"#/components/schemas/TtsRequestModel","default":"lightning_v3.1","description":"TTS model to route the request to. Controls which model pool serves\nthis synthesis.\n\n- `lightning_v3.1` (default) — standard Lightning v3.1.\n- `lightning_v3.1_pro` — Lightning v3.1 Pro pool. Improved audio\n  quality and naturalness, with a curated voice catalog. See the\n  [Lightning v3.1 Pro model card](/waves/model-cards/text-to-speech/lightning-v-3-1-pro)\n  for supported voice IDs.\n\nSame concurrency and latency profile across both. Other request\nparameters behave identically.\n"},"sample_rate":{"$ref":"#/components/schemas/TtsRequestSampleRate","default":44100,"description":"The sample rate for the generated audio."},"speed":{"type":"number","format":"double","default":1,"description":"The speed of the generated speech."},"language":{"$ref":"#/components/schemas/TtsRequestLanguage","default":"en","description":"Language code for synthesis. Influences pronunciation, number/date\nnormalization, and phoneme selection.\n\nEach voice has its own `tags.language` set in the voice catalog —\nquery `GET /waves/v1/lightning-v3.1/get_voices`. Pass a language\nthe voice was trained on; passing other codes is accepted by the\nAPI but produces English-pronounced output.\n\nOn `lightning_v3.1`, the full 12-language catalog applies. On\n`lightning_v3.1_pro`, Indian voices speak `en` and `hi` (with\n`auto` for code-switching); British and American voices speak\nEnglish only.\n"},"output_format":{"$ref":"#/components/schemas/TtsRequestOutputFormat","default":"pcm","description":"Format of the returned audio. `pcm` is the lowest-latency option\nbut requires a decoder to play; `mp3` and `wav` are directly\nplayable in browsers and most media players. The server default\nis `pcm` when the field is omitted — the